<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e14">
<title>産卵床調査記録</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.svg">
<link rel="stylesheet" href="./leaflet.css">
<style>
  :root{
    --bg:#0a0e14; --panel:#121a22; --panel2:#1a242e; --line:#2a3844;
    --fg:#e6eef5; --muted:#8496a6; --accent:#4aa3dd; --accent2:#2f6f9e;
    --warn:#e0a030; --danger:#d05555; --chip:#1c2a36;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    font-size:16px; line-height:1.5; overscroll-behavior:none;}
  body{padding-bottom:env(safe-area-inset-bottom);}
  h1,h2,h3{margin:0 0 .4em;}
  a{color:var(--accent);}
  button{font-family:inherit; font-size:16px;}
  .app{max-width:900px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}

  /* ヘッダー */
  header{position:sticky; top:0; z-index:500; background:var(--panel);
    border-bottom:1px solid var(--line); padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;}
  .hbar{display:flex; align-items:center; gap:10px;}
  .htitle{font-weight:700; font-size:18px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .back{background:none; border:none; color:var(--accent); font-size:16px; padding:6px 4px; cursor:pointer;}
  .hsub{display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; font-size:13px; color:var(--muted);}
  .hsub .pill{background:var(--chip); border:1px solid var(--line); border-radius:20px; padding:2px 10px;}
  .pill.ok{color:var(--accent);} .pill.warn{color:var(--warn);} .pill.off{color:var(--muted);}

  main{flex:1; padding:14px; padding-bottom:90px;}

  /* カード・リスト */
  .card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-bottom:12px;}
  .card.tap{cursor:pointer;} .card.tap:active{background:var(--panel2);}
  .row{display:flex; align-items:center; gap:10px;}
  .grow{flex:1;}
  .muted{color:var(--muted);} .small{font-size:13px;} .tiny{font-size:12px;}
  .badge{display:inline-block; border-radius:20px; padding:2px 10px; font-size:12px; background:var(--chip); border:1px solid var(--line);}
  .badge.status-未開始{color:var(--muted);}
  .badge.status-調査中{color:var(--accent); border-color:var(--accent2);}
  .badge.status-終了{color:var(--muted);}
  .badge.warn{color:var(--warn);}
  .sp{height:8px;}
  .empty{text-align:center; color:var(--muted); padding:34px 10px; font-size:15px;}

  /* ボタン */
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:var(--panel2); color:var(--fg); border:1px solid var(--line);
    border-radius:12px; padding:12px 16px; cursor:pointer; width:100%; text-align:center;}
  .btn:active{background:var(--panel);}
  .btn.primary{background:var(--accent2); border-color:var(--accent); color:#fff; font-weight:700;}
  .btn.ghost{background:none;}
  .btn.danger{color:var(--danger); border-color:#5a2e2e;}
  .btn.big{font-size:18px; padding:18px; font-weight:700;}
  .btn-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .btn-grid.one{grid-template-columns:1fr;}

  /* フォーム */
  label.field{display:block; margin-bottom:14px;}
  label.field > .lab{display:block; font-size:13px; color:var(--muted); margin-bottom:5px;}
  input,select,textarea{width:100%; background:var(--panel2); color:var(--fg);
    border:1px solid var(--line); border-radius:10px; padding:11px 12px; font-size:16px;}
  textarea{min-height:70px; resize:vertical;}
  input:focus,select:focus,textarea:focus{outline:none; border-color:var(--accent);}
  .req{color:var(--accent);}
  .seg{display:flex; flex-wrap:wrap; gap:8px;}
  .seg button{background:var(--panel2); border:1px solid var(--line); color:var(--muted);
    border-radius:20px; padding:8px 14px; cursor:pointer;}
  .seg button.on{background:var(--accent2); border-color:var(--accent); color:#fff;}
  .two{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .sect{font-size:13px; color:var(--muted); font-weight:700; letter-spacing:.04em;
    margin:20px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--line);}

  /* 集計テーブル */
  table{width:100%; border-collapse:collapse; font-size:14px;}
  th,td{text-align:left; padding:8px 6px; border-bottom:1px solid var(--line);}
  th{color:var(--muted); font-weight:600;}
  td.num,th.num{text-align:right;}
  .tablewrap{overflow-x:auto; -webkit-overflow-scrolling:touch;
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:6px 12px;}

  /* 地図 */
  #map{height:calc(100vh - 300px); min-height:320px; border-radius:var(--radius); border:1px solid var(--line);}
  #pickMap,#unitMap,#omap{height:320px; border-radius:var(--radius); border:1px solid var(--line);}
  .seg.basemap{margin-bottom:8px;}
  .seg.basemap button{padding:6px 12px; font-size:14px;}
  .leaflet-container{background:#0d1218;}
  .locate-btn{padding:8px 12px; font-size:14px; font-weight:700; line-height:1;
    background:var(--panel); color:var(--fg); border:1px solid var(--line);
    border-radius:10px; cursor:pointer; box-shadow:0 1px 5px rgba(0,0,0,.4);}
  .locate-btn:active{background:var(--panel2);}
  .leaflet-popup-content{color:#111;}

  /* 写真 */
  .mediagrid{margin-top:10px; display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .mediathumb{position:relative; width:100%; aspect-ratio:1/1; background:var(--panel2);
    border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  .mediathumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .mediadel{position:absolute; top:4px; right:4px; width:26px; height:26px; line-height:1;
    background:rgba(0,0,0,.65); color:#fff; border:none; border-radius:50%; font-size:15px; cursor:pointer;}

  /* トースト */
  #toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%);
    background:#000; color:#fff; padding:11px 18px; border-radius:24px; font-size:14px;
    opacity:0; transition:opacity .25s; pointer-events:none; z-index:2000; max-width:90%;}
  #toast.show{opacity:.94;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="hbar">
      <button class="back" id="backBtn" onclick="goBack()" style="display:none">‹ 戻る</button>
      <div class="htitle" id="title">産卵床調査記録</div>
    </div>
    <div class="hsub" id="sub"></div>
  </header>
  <main id="main"></main>
</div>
<div id="toast"></div>

<script src="./leaflet.js"></script>
<script>
/* ============================================================
   産卵床調査記録アプリ
   サケ科魚類の産卵床（レッド）調査を現場のスマホだけで記録する。
   保存は端末内のみ（localStorage / IndexedDB）。外部へ自動送信しない。
   ============================================================ */
const APP_VERSION = 'v10';   // sw.js の CACHE 名と揃える

/* ---------- 小道具 ---------- */
const $  = (s,r)=> (r||document).querySelector(s);
const $$ = (s,r)=> Array.from((r||document).querySelectorAll(s));
function uuid(){
  if(crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
    const r=Math.random()*16|0; return (c==='x'?r:(r&0x3|0x8)).toString(16); });
}
function nowISO(){ return new Date().toISOString(); }
function pad2(n){ return String(n).padStart(2,'0'); }
function localDatetimeValue(d){ d=d||new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}T${pad2(d.getHours())}:${pad2(d.getMinutes())}`; }
function dateValue(d){ d=d||new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function fmtDate(s){ if(!s) return '—'; return String(s).slice(0,10); }
function fmtTime(s){ if(!s) return '—'; const d=new Date(s); if(isNaN(d)) return '—';
  return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),2400); }
// 数値入力の取り出し。空欄は '' のまま返す（0 と未入力を区別するため）
function numVal(sel){ const el=$(sel); if(!el) return ''; const v=String(el.value).trim();
  if(v==='') return ''; const n=parseFloat(v); return isNaN(n)?'':n; }

/* ============================================================
   保存層（localStorage）
   キーの頭は rd_ 。同じ場所に別アプリ（鳥類調査等）があってもデータが混ざらないようにする。
   削除は deleted_at を立てる論理削除のみ。完全消去はゴミ箱から明示的に行う。
   ============================================================ */
const DB = {
  key:{ sv:'rd_surveys', re:'rd_reaches', rd:'rd_redds', nt:'rd_notes', un:'rd_units' },
  load(k){ try{ const a=JSON.parse(localStorage.getItem(k)||'[]'); return Array.isArray(a)?a:[]; }
           catch(e){ return []; } },
  // バックアップ・整合性確認用。壊れていたら例外にして「空」と誤認させない
  loadRaw(k){ const a=JSON.parse(localStorage.getItem(k)||'[]');
    if(!Array.isArray(a)) throw new Error('broken: '+k); return a; },
  save(k,a){
    try{ localStorage.setItem(k, JSON.stringify(a)); return true; }
    catch(e){ toast('端末の保存容量がいっぱいです。書き出してから古い調査を消してください'); return false; }
  },
  upsert(k,obj){
    const a=this.load(k); const i=a.findIndex(x=>x.uuid===obj.uuid);
    obj.updated_at=nowISO();
    if(i>=0){ a[i]=Object.assign({},a[i],obj); } else { obj.created_at=obj.created_at||nowISO(); a.push(obj); }
    return this.save(k,a) ? obj : null;
  },
  get(k,u){ return this.load(k).find(x=>x.uuid===u) || null; },
  // 保存に失敗したら false を返す。呼び出し側で「できたことにしない」ため
  softDelete(k,u,by){ const a=this.load(k); const o=a.find(x=>x.uuid===u);
    if(!o) return true;
    o.deleted_at=nowISO(); o.updated_at=nowISO();
    if(by) o.deleted_by=by; else delete o.deleted_by;   // 親と一緒に消したかを覚えておく
    return this.save(k,a); },
  restore(k,u){ const a=this.load(k); const o=a.find(x=>x.uuid===u);
    if(!o) return true;
    delete o.deleted_at; delete o.deleted_by; o.updated_at=nowISO();
    return this.save(k,a); },
  hardDelete(k,u){ return this.save(k, this.load(k).filter(x=>x.uuid!==u)); },

  alive(k){ return this.load(k).filter(x=>!x.deleted_at); },
  deleted(k){ return this.load(k).filter(x=>x.deleted_at); },

  surveys(){ return this.alive(this.key.sv).sort((a,b)=>
    String(b.survey_date||'').localeCompare(String(a.survey_date||'')) ||
    String(b.created_at||'').localeCompare(String(a.created_at||''))); },
  survey(u){ const s=this.get(this.key.sv,u); return (s&&!s.deleted_at)?s:null; },
  reachesOf(sv){ return this.alive(this.key.re).filter(x=>x.survey_uuid===sv)
    .sort((a,b)=>String(a.created_at||'').localeCompare(String(b.created_at||''))); },
  reddsOf(sv){ return this.alive(this.key.rd).filter(x=>x.survey_uuid===sv)
    .sort((a,b)=>String(b.observed_at||'').localeCompare(String(a.observed_at||''))); },
  notesOf(sv){ return this.alive(this.key.nt).filter(x=>x.survey_uuid===sv)
    .sort((a,b)=>String(b.recorded_at||'').localeCompare(String(a.recorded_at||''))); },
  unitsOf(sv){ return this.alive(this.key.un).filter(x=>x.survey_uuid===sv)
    .sort((a,b)=>String(a.created_at||'').localeCompare(String(b.created_at||''))); },
};

/* ============================================================
   写真の保存（IndexedDB）
   写真そのものは localStorage に入らないので IndexedDB に置き、
   記録側には「どの写真か」を示す小さな情報だけを持たせる。
   ============================================================ */
const MEDIA_DB_NAME='redd_survey_media', MEDIA_DB_VER=1, MEDIA_STORE='photo';
let _mediaDB=null;
function openMediaDB(){
  if(_mediaDB) return Promise.resolve(_mediaDB);
  return new Promise((res,rej)=>{
    const q=indexedDB.open(MEDIA_DB_NAME, MEDIA_DB_VER);
    q.onupgradeneeded=()=>{ const db=q.result;
      if(!db.objectStoreNames.contains(MEDIA_STORE)) db.createObjectStore(MEDIA_STORE,{keyPath:'id'}); };
    q.onsuccess=()=>{ _mediaDB=q.result; res(_mediaDB); };
    q.onerror=()=>rej(q.error);
  });
}
// 書き込みは tx.oncomplete まで待つ。ここで待たないと「保存したのに無い」が起きる
function idbDo(mode, fn){
  return openMediaDB().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(MEDIA_STORE, mode);
    let out;
    const r=fn(tx.objectStore(MEDIA_STORE));
    if(r && typeof r.then==='function'){ /* 使わない */ }
    else if(r){ r.onsuccess=()=>{ out=r.result; }; }
    tx.oncomplete=()=>res(out);
    tx.onerror=()=>rej(tx.error);
    tx.onabort=()=>rej(tx.error);
  }));
}
const PhotoDB = {
  put(rec){ return idbDo('readwrite', st=>st.put(rec)); },
  get(id){ return idbDo('readonly', st=>st.get(id)); },
  del(id){ return idbDo('readwrite', st=>st.delete(id)); },
  allIds(){ return idbDo('readonly', st=>st.getAllKeys()); },
  // どこからも参照されていない写真を消す。
  // 参照元が1つでも読めなければ何もしない（消しすぎ防止）
  async gc(){
    let refs;
    try{
      refs = new Set();
      // 写真を持ちうるコレクションを取りこぼすと、その写真が起動時に消える。
      // 個別列挙ではなく、保存しているキーを全部見る
      Object.keys(DB.key).forEach(kk=>{
        DB.loadRaw(DB.key[kk]).forEach(x=>(x.photos||[]).forEach(p=>p&&p.id&&refs.add(p.id)));
      });
    }catch(e){ return; }
    const ids = await this.allIds();
    for(const id of ids){ if(!refs.has(id)) await this.del(id); }
  }
};

// 現場写真はそのままだと1枚数MBあり端末を圧迫するので、長辺1600pxのJPEGに縮める
async function shrinkImage(file){
  if(!/^image\//.test(file.type||'')) return file;
  try{
    const bmp = await createImageBitmap(file);
    const scale = Math.min(1, 1600/Math.max(bmp.width, bmp.height));
    if(scale>=1 && file.size < 1.5*1024*1024){ if(bmp.close) bmp.close(); return file; }
    const w=Math.max(1,Math.round(bmp.width*scale)), h=Math.max(1,Math.round(bmp.height*scale));
    const c=document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(bmp,0,0,w,h);
    if(bmp.close) bmp.close();
    const blob = await new Promise(r=>c.toBlob(r,'image/jpeg',0.85));
    return (blob && blob.size < file.size) ? blob : file;
  }catch(e){ return file; }   // 変換できない端末では元のまま保存する
}

/* 写真パネル（産卵床・メモで共用。SCREENS._photos が今開いている記録の写真一覧） */
async function pickPhotos(input){
  const files = Array.from(input.files||[]);
  input.value='';
  if(!files.length) return;
  const gen = screenGen();          // 取り込み中に別の記録へ移ったら、そちらには足さない
  toast('写真を取り込んでいます…');
  let ok=0, ng=0;
  for(const f of files){
    try{
      const blob = await shrinkImage(f);
      const ext = blobExt(blob);
      const id = uuid();
      await PhotoDB.put({ id, blob, ext, size:blob.size, added_at:nowISO() });
      if(screenStale(gen)) return;   // 実体は残るが参照は付けない。使われなければ gc が片付ける
      SCREENS._photos = (SCREENS._photos||[]).concat([{ id, ext, size:blob.size }]);
      ok++;
    }catch(e){ console.error(e); ng++; }
  }
  if(screenStale(gen)) return;
  renderPhotoPanel();
  if(ng) alert(`写真 ${ok}枚を追加しました。${ng}枚は保存できませんでした（端末の空き容量を確認してください）`);
  else toast(ok+'枚を追加しました');
}
// 実際の中身に合った拡張子を付ける。中身がPNGなのに .jpg だと開けないソフトがある
function blobExt(blob){
  const t=(blob&&blob.type)||'';
  if(t.includes('png')) return 'png';
  if(t.includes('webp')) return 'webp';
  if(t.includes('heic')||t.includes('heif')) return 'heic';
  return 'jpg';
}
// 写真そのものはここでは消さない。保存せずに戻った場合に、記録が
// 「無い写真」を指してしまうため。実体は使われなくなった時点で gc() が片付ける
function delPhoto(id){
  if(!confirm('この写真を外しますか？（保存すると反映されます）')) return;
  SCREENS._photos = (SCREENS._photos||[]).filter(p=>p.id!==id);
  renderPhotoPanel();
}
function revokePhotoUrls(){
  (SCREENS._photoUrls||[]).forEach(u=>{ try{ URL.revokeObjectURL(u); }catch(e){} });
  SCREENS._photoUrls=[];
}
async function renderPhotoPanel(){
  const box=$('#photoGrid'); if(!box) return;
  revokePhotoUrls();
  const list = SCREENS._photos||[];
  if(!list.length){ box.innerHTML=''; return; }
  const parts=[];
  for(const p of list){
    let rec=null; try{ rec=await PhotoDB.get(p.id); }catch(e){}
    if(!rec||!rec.blob){ continue; }
    const url=URL.createObjectURL(rec.blob);
    SCREENS._photoUrls=(SCREENS._photoUrls||[]).concat([url]);
    parts.push(`<div class="mediathumb"><img src="${url}" alt="写真">
      <button class="mediadel" onclick="delPhoto('${p.id}')" title="削除">×</button></div>`);
  }
  box.innerHTML = parts.join('');
}
function photoPanelHtml(){
  return `<input type="file" id="fPhotoIn" accept="image/*" capture="environment" multiple
            style="display:none" onchange="pickPhotos(this)">
    <button class="btn" onclick="document.getElementById('fPhotoIn').click()">写真を追加（カメラ／端末から）</button>
    <div class="mediagrid" id="photoGrid"></div>`;
}

/* ============================================================
   選択肢マスタ
   ============================================================ */
// 対象魚種。現場で追加できるよう、ここは初期値として扱う
const SPECIES_DEFAULT = ['サケ','カラフトマス','サクラマス','ヤマメ','オショロコマ','イワナ','ニジマス','不明'];
function speciesList(){
  try{ const a=JSON.parse(localStorage.getItem('rd_species')||'null');
       if(Array.isArray(a) && a.length) return a; }catch(e){}
  return SPECIES_DEFAULT.slice();
}
function speciesSave(list){ localStorage.setItem('rd_species', JSON.stringify(list)); }

const OPT = {
  // 何を記録したか。組み合わせで選ぶ（産卵床のみ／産卵床＋親魚／親魚のみ／ホッチャレのみ…）
  target:     ['産卵床','親魚','ホッチャレ'],
  weather:    ['晴','曇','雨','雪','みぞれ'],
  turbidity:  ['清','やや濁','濁'],
  waterLevel: ['平水','増水','減水'],
  // 産卵床
  basis:      ['親魚確認','形状から推定','不明'],   // 種の判断根拠
  age:        ['新しい','やや古い','古い','不明'],  // 新旧
  state:      ['掘削中','完成','産卵後','不明'],
  // 粒径区分。産卵床の底質と物理環境の河床材料で同じ区分を使う
  substrate:  ['泥','砂','細礫','中礫','大礫','巨礫','岩盤'],
  riverForm:  ['早瀬','平瀬','淵','瀬頭'],           // 河川形態（どこに産んだか）
  embedded:   ['少','中','多'],                     // 埋没度
  cover:      ['無','植生','倒木','淵','岸際'],
  behavior:   ['ペア形成','掘削','産卵','ホバリング','闘争','静止','その他'],
  noteCat:    ['調査条件','河川状況','特記事項','次回課題','その他'],
};
// 粒径区分の目安（画面に小さく出す）
const GRAIN_HINT = '泥 0.06mm未満／砂 0.06〜2mm／細礫 2〜16mm／中礫 16〜64mm／大礫 64〜256mm／巨礫 256mm以上／岩盤';

/* ============================================================
   画面遷移
   SCREENS[name](arg) は {title, sub[], html, onMount} を返す。
   ============================================================ */
let STACK = [{name:'home', arg:null}];
// 画面を描くたびに増える通し番号。GPS取得・写真取り込み・音声認識のような
// 時間のかかる処理は、始めた時の番号を覚えておき、終わった時に変わっていたら
// 何もしない。そうしないと、待っている間に別の記録を開いたとき、
// その記録に前の画面の結果が書き込まれてしまう
let SCREEN_SEQ = 0;
function screenGen(){ return SCREEN_SEQ; }
function screenStale(gen){ return gen !== SCREEN_SEQ; }
const SCREENS = {};

function nav(name, arg){ stashEditDraft(); STACK.push({name,arg}); render(); }
function goBack(){ if(STACK.length>1){ stashEditDraft(); STACK.pop(); render(); } }
function reset(name,arg){ STACK=[{name:name||'home',arg:arg||null}]; render(); }

function render(){
  SCREEN_SEQ++;
  destroyMap();          // 前の画面の地図を残さない（画面の中身を入れ替えるため）
  closePickMap();
  closeUnitMap();
  closeOfflineMap();
  revokePhotoUrls();     // 前の画面の写真の一時URLを解放する
  const cur = STACK[STACK.length-1];
  const scr = SCREENS[cur.name] || SCREENS.home;
  let v;
  try{ v = scr(cur.arg); }
  catch(e){ console.error(e); toast('画面を開けませんでした'); v = SCREENS.home(); }
  if(!v){ STACK=[{name:'home',arg:null}]; v = SCREENS.home(); }
  $('#title').textContent = v.title || '産卵床調査記録';
  $('#backBtn').style.display = STACK.length>1 ? '' : 'none';
  $('#sub').innerHTML = (v.sub||[]).map(s=>
    `<span class="pill ${s.cls||''}"${s.id?` id="${s.id}"`:''}>${esc(s.text)}</span>`).join('');
  $('#main').innerHTML = v.html || '';
  window.scrollTo(0,0);
  if(v.onMount) try{ v.onMount(); }catch(e){ console.error(e); }
}

/* 選択ボタン（seg）の共通処理 */
function pickSeg(btn){
  btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function segHtml(field, options, current, allowEmpty){
  const opts = allowEmpty ? ['なし'].concat(options) : options;
  const cur = current || (allowEmpty?'なし':'');
  return `<div class="seg" data-seg="${field}">` + opts.map(o=>
    `<button type="button" class="${o===cur?'on':''}" onclick="pickSeg(this)">${esc(o)}</button>`).join('') + `</div>`;
}
function segVal(field){
  const on = document.querySelector(`[data-seg="${field}"] button.on`);
  if(!on) return '';
  return on.textContent==='なし' ? '' : on.textContent;
}

/* 複数選べる版（記録の対象など）。押すたびに入り切りする */
function pickSegMulti(btn, onChange){
  btn.classList.toggle('on');
  if(onChange) window[onChange] && window[onChange]();
}
function segMultiHtml(field, options, current, onChange){
  const cur = current||[];
  return `<div class="seg" data-segmulti="${field}">` + options.map(o=>
    `<button type="button" class="${cur.indexOf(o)>=0?'on':''}"
       onclick="pickSegMulti(this${onChange?`,'${onChange}'`:''})">${esc(o)}</button>`).join('') + `</div>`;
}
function segMultiVal(field){
  return $$(`[data-segmulti="${field}"] button.on`).map(b=>b.textContent);
}

/* ============================================================
   調査の作成・編集
   ============================================================ */
const DRAFT_KEY = 'rd_draft_survey';

/* 入力途中の下書き。
   記録・物理環境・メモの入力画面は項目が多く、誤って戻ると全部消えてしまうため、
   画面を離れるときに書きかけを保存し、次に同じ画面を開いたら戻す。
   保存した時点で下書きは消す。 */
const EDIT_DRAFT_KEY = 'rd_draft_edit';
function editDrafts(){ try{ return JSON.parse(localStorage.getItem(EDIT_DRAFT_KEY)||'{}'); }catch(e){ return {}; } }
function editDraftSave(uuid, obj){
  if(!uuid) return;
  if(obj && obj._new && !draftHasContent(obj._kind, obj)){ editDraftClear(uuid); return; }
  const d = editDrafts(); d[uuid] = obj;
  const keys = Object.keys(d);
  if(keys.length > 20) delete d[keys[0]];   // 溜め込みすぎない
  try{ localStorage.setItem(EDIT_DRAFT_KEY, JSON.stringify(d)); }catch(e){}
}
function editDraftGet(uuid){ return editDrafts()[uuid] || null; }
// まだ一度も保存していない書きかけを探す。
// 新規作成のたびに新しいIDが振られるため、IDでは見つけられない
function findNewDraft(kind, sv){
  const d = editDrafts();
  const dbKey = kind==='redd' ? DB.key.rd : kind==='unit' ? DB.key.un : DB.key.nt;
  const id = Object.keys(d).find(k=>{
    const x=d[k];
    if(!x || x._kind!==kind || !x._new || x._sv!==sv) return false;
    if(DB.get(dbKey, k)) return false;        // その後に保存されていたら書きかけではない
    return draftHasContent(kind, x);          // 空の書きかけで新規入力を邪魔しない
  });
  return id ? {uuid:id, draft:d[id]} : null;
}
// 何か入力されているか。空なら控える意味がない
function draftHasContent(kind, x){
  const filled = v => v!=='' && v!=null;
  const arr = v => Array.isArray(v) && v.length>0;
  if(kind==='redd') return !!(x.species || filled(x.length_cm) || filled(x.width_cm) ||
    x.note || filled(x.latitude) || arr(x.env_points) || arr(x.photos) ||
    filled(x.female_n) || filled(x.male_n) || filled(x.carcass_n) ||
    filled(x.water_temp_c) || filled(x.intragravel_temp_c));
  if(kind==='unit') return !!(x.river_form || x.name || filled(x.start_lat) || filled(x.end_lat) ||
    filled(x.depth_cm_rep) || filled(x.velocity_ms_rep) || x.substrate_rep || x.memo ||
    arr(x.env_points) || (x.substrate_pct && Object.keys(x.substrate_pct).length));
  return !!(x.content || arr(x.photos));
}
function editDraftClear(uuid){
  const d = editDrafts();
  if(uuid in d){ delete d[uuid]; try{ localStorage.setItem(EDIT_DRAFT_KEY, JSON.stringify(d)); }catch(e){} }
}
// 画面を離れる直前に呼ぶ。いま開いている入力画面の書きかけを控える
function stashEditDraft(){
  const cur = STACK[STACK.length-1];
  if(!cur) return;
  try{
    if(cur.name==='reddEdit' && SCREENS._reddUuid && $('#fNo')){
      envSync();
      editDraftSave(SCREENS._reddUuid, Object.assign(collectReddForm(), {
        _kind:'redd', _sv:SCREENS._editSv, _new:!DB.get(DB.key.rd, SCREENS._reddUuid),
        env_points:(SCREENS._env||[]).slice(), photos:(SCREENS._photos||[]).slice(),
        gps_accuracy:SCREENS._acc, position_source:SCREENS._posSrc }));
    }else if(cur.name==='unitEdit' && SCREENS._unitUuid && $('#uName')){
      envSync();
      editDraftSave(SCREENS._unitUuid, { _kind:'unit',
        _sv:SCREENS._editSv, _new:!DB.get(DB.key.un, SCREENS._unitUuid),
        name:($('#uName').value||'').trim(), river_form:segVal('uForm'),
        start_lat:numVal('#uSLat'), start_lon:numVal('#uSLon'),
        end_lat:numVal('#uELat'), end_lon:numVal('#uELon'),
        length_m_manual:numVal('#uLenM'), river_width_m:numVal('#uWidth'),
        depth_cm_rep:numVal('#uDep'), velocity_ms_rep:numVal('#uVel'),
        substrate_rep:segVal('uSub'), substrate_pct:collectGrainPct(),
        env_points:(SCREENS._env||[]).slice(), memo:$('#uMemo').value||'' });
    }else if(cur.name==='noteEdit' && SCREENS._noteUuid && $('#fNText')){
      editDraftSave(SCREENS._noteUuid, { _kind:'note',
        _sv:SCREENS._editSv, _new:!DB.get(DB.key.nt, SCREENS._noteUuid),
        content:$('#fNText').value||'', category:segVal('noteCat'),
        photos:(SCREENS._photos||[]).slice() });
    }
  }catch(e){ console.error(e); }
}

      <div class="two">
        <label class="field"><span class="lab">水系</span>
          <input id="fSystem" value="${esc(s.water_system||'')}" placeholder="例：石狩川水系" oninput="draftSave()"></label>
        <label class="field"><span class="lab">調査日</span>

      <label class="field"><span class="lab">調査者</span>
        <input id="fInv" value="${esc(s.investigator||'')}" placeholder="例：山田・佐藤" oninput="draftSave()"></label>

          <input id="fWaterT" type="number" step="0.1" inputmode="decimal" value="${esc(s.water_temp_c??'')}" oninput="draftSave()"></label>
      </div>
      <label class="field"><span class="lab">濁り</span>${segHtml('turbidity', OPT.turbidity, s.turbidity, true)}</label>
      <label class="field"><span class="lab">水位の状況</span>${segHtml('waterLevel', OPT.waterLevel, s.water_level, true)}</label>

      <div class="sect">その他</div>
      <label class="field"><span class="lab">調査の目的</span>
        <textarea id="fPurpose" oninput="draftSave()">${esc(s.purpose||'')}</textarea></label>
      <label class="field"><span class="lab">メモ</span>
        <textarea id="fMemo" oninput="draftSave()">${esc(s.memo||'')}</textarea></label>

      <button class="btn primary big" onclick="saveSurvey('${s.uuid}', ${editing})">保存する</button>
      <div class="sp"></div>
      <button class="btn ghost" onclick="goBack()">やめる</button>
    `,
    onMount:()=>{ SCREENS._editUuid=s.uuid; SCREENS._editing=editing;
      $$('[data-seg] button').forEach(b=>b.addEventListener('click', draftSave)); }
  };
};

function collectSurveyForm(){
  const river=($('#fRiver').value||'').trim();
  const date =$('#fDate').value || dateValue();
  const name =($('#fName').value||'').trim();
  return {
    river_name: river,
    water_system: ($('#fSystem').value||'').trim(),
    survey_date: date,
    name: name || (river ? `${river} ${date}` : `調査 ${date}`),
    investigator: ($('#fInv').value||'').trim(),
    weather: segVal('weather'),
    air_temp_c: numVal('#fAirT'),
    water_temp_c: numVal('#fWaterT'),
    turbidity: segVal('turbidity'),
    water_level: segVal('waterLevel'),
    purpose: $('#fPurpose').value||'',
    memo: $('#fMemo').value||'',
  };
}
// 新規作成中だけ下書きを保存する（編集中の既存データを下書きで上書きしないため）
function draftSave(){
  if(SCREENS._editing) return;
  try{
    const d = Object.assign({ uuid:SCREENS._editUuid, status:'未開始' }, collectSurveyForm());
    localStorage.setItem(DRAFT_KEY, JSON.stringify(d));
  }catch(e){}
}
function saveSurvey(u, editing){
  const f = collectSurveyForm();
  if(!f.river_name){ toast('河川名を入れてください'); $('#fRiver').focus(); return; }
  const base = editing ? {} : { status:'未開始' };
  const ok = DB.upsert(DB.key.sv, Object.assign({uuid:u}, base, f));
  if(!ok) return;
  localStorage.removeItem(DRAFT_KEY);
  toast('保存しました');
  if(editing) goBack(); else reset('survey', u);
}
function deleteSurvey(u){
  const s = DB.survey(u); if(!s) return;
  const n = DB.reddsOf(u).length;
  if(!confirm(`「${s.name}」を削除しますか？\n産卵床 ${n} 件も一緒にゴミ箱へ入ります。`)) return;
  // 調査を消したら、ぶら下がる記録もまとめてゴミ箱へ（片方だけ残らないように）
  // 記録中の軌跡が消した調査に書き込み続けないよう、先に止める
  if(TRACK && DB.reachesOf(u).some(r=>r.uuid===TRACK.reach_uuid)) TRACK=null;
  let ok = true;
  [[DB.key.re,'reachesOf'],[DB.key.rd,'reddsOf'],[DB.key.nt,'notesOf'],[DB.key.un,'unitsOf']].forEach(([k,fn])=>{
    DB[fn](u).forEach(x=>{ if(!DB.softDelete(k, x.uuid, u)) ok=false; });
  });
  if(!DB.softDelete(DB.key.sv, u)) ok=false;
  if(!DB.surveys().some(x=>x.status==='調査中')) stopGps();
  if(!ok){ alert('削除の途中で保存できませんでした。端末の空き容量を確認してください。'); render(); return; }
  toast('ゴミ箱へ入れました');
  reset('home');
}

/* ============================================================
   位置（GPS）と区間の軌跡
   調査中は位置を取り続け、区間を記録中ならその軌跡に足していく。
   ============================================================ */
let gpsWatchId = null;
let lastFix = null;    // {lat, lon, acc, t}
let TRACK = null;      // {reach_uuid, pts:[[lat,lon],...], lastSave}

const GPS_MAX_ACC   = 50;      // これより粗い位置は軌跡に使わない（m）
const TRACK_MIN_MOVE= 3;       // これ未満しか動いていなければ軌跡に足さない（m）
const TRACK_SAVE_MS = 15000;   // 軌跡を保存する間隔（書き込みすぎを防ぐ）

function validPt(p){ return Array.isArray(p) && p.length===2 && isFinite(p[0]) && isFinite(p[1])
  && Math.abs(p[0])<=90 && Math.abs(p[1])<=180; }
// 短い距離なので、緯度による経度の縮みだけ補正した平面近似で足りる
function distMeters(a,b){
  const R=6378137, rad=Math.PI/180;
  const y=(b[0]-a[0])*rad;
  const x=(b[1]-a[1])*rad*Math.cos((a[0]+b[0])/2*rad);
  return Math.sqrt(x*x+y*y)*R;
}
function pathLength(path){
  const p=(path||[]).filter(validPt); let d=0;
  for(let i=1;i<p.length;i++) d+=distMeters(p[i-1],p[i]);
  return d;
}
function fmtDist(d){ d=+d||0; return d>=1000 ? (d/1000).toFixed(2)+'km' : Math.round(d)+'m'; }
function fmtDur(ms){ const s=Math.max(0,Math.round(ms/1000));
  const h=Math.floor(s/3600), m=Math.floor(s%3600/60);
  return h ? `${h}時間${m}分` : `${m}分`; }

function startGps(){
  if(gpsWatchId!=null || !navigator.geolocation) return;
  gpsWatchId = navigator.geolocation.watchPosition(
    p=>{ lastFix={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy, t:Date.now()};
         trackAppend(); updateGpsPill(); },
    ()=>{ updateGpsPill(); },
    {enableHighAccuracy:true, maximumAge:2000, timeout:20000});
}
function stopGps(){
  if(gpsWatchId!=null && navigator.geolocation) navigator.geolocation.clearWatch(gpsWatchId);
  gpsWatchId=null;
}
function gpsText(){
  if(!lastFix) return 'GPS 取得中';
  const age=(Date.now()-lastFix.t)/1000;
  if(age>60) return 'GPS 途切れ';
  return 'GPS 約'+Math.round(lastFix.acc)+'m';
}
function updateGpsPill(){ const el=$('#gpsPill'); if(el) el.textContent=gpsText(); }

function trackAppend(){
  if(!TRACK || !lastFix) return;
  if(lastFix.acc > GPS_MAX_ACC) return;            // 精度が悪い点は距離を狂わせるので使わない
  const pt=[lastFix.lat, lastFix.lon];
  const last=TRACK.pts[TRACK.pts.length-1];
  if(last && distMeters(last, pt) < TRACK_MIN_MOVE) return;   // 立ち止まり中の揺れで距離が伸びるのを防ぐ
  TRACK.pts.push(pt);
  if(Date.now()-TRACK.lastSave > TRACK_SAVE_MS) trackSave();
  const el=$('#reachLen'); if(el) el.textContent=fmtDist(pathLength(TRACK.pts));
}
function trackSave(){
  if(!TRACK) return;
  // 記録中の区間が消えている・別調査のものになっている場合は書き込まない
  const r = DB.get(DB.key.re, TRACK.reach_uuid);
  if(!r || r.deleted_at){ TRACK=null; return; }
  TRACK.lastSave=Date.now();
  DB.upsert(DB.key.re, { uuid:TRACK.reach_uuid, track:TRACK.pts.slice(),
    length_m_auto: Math.round(pathLength(TRACK.pts)) });
}

/* ---------- 区間 ---------- */
function activeReach(sv){ return DB.reachesOf(sv).find(r=>!r.ended_at) || null; }
function reachLength(r){
  // 手入力があればそちらを優先する（GPSが乱れた区間を後から直せるように）
  if(r.length_m_manual!=='' && r.length_m_manual!=null) return +r.length_m_manual;
  return +r.length_m_auto || 0;
}
function reachName(sv, u){ const r=DB.get(DB.key.re,u); return r?r.name:''; }
function startReach(sv){
  if(activeReach(sv)){ toast('すでに区間を記録中です'); return; }
  const r = { uuid:uuid(), survey_uuid:sv, name:'St.'+(DB.reachesOf(sv).length+1),
    started_at:nowISO(), ended_at:'',
    start_lat: lastFix?+lastFix.lat.toFixed(6):'', start_lon: lastFix?+lastFix.lon.toFixed(6):'',
    end_lat:'', end_lon:'',
    track: (lastFix && lastFix.acc<=GPS_MAX_ACC) ? [[lastFix.lat,lastFix.lon]] : [],
    length_m_auto:0, length_m_manual:'', river_width_m:'', memo:'' };
  if(!DB.upsert(DB.key.re, r)) return;
  TRACK = { reach_uuid:r.uuid, pts:(r.track||[]).slice(), lastSave:Date.now() };
  startGps();
  toast(r.name+' の記録を始めました');
  render();
}
function endReach(sv){
  const r = activeReach(sv); if(!r) return;
  // いま軌跡を取っているのが本当にこの区間かを確認する（複数調査が並行した場合の取り違え防止）
  const pts = (TRACK && TRACK.reach_uuid===r.uuid) ? TRACK.pts : (r.track||[]);
  const end = pts[pts.length-1] || [];
  if(TRACK && TRACK.reach_uuid!==r.uuid) toast('別の区間を記録中でした。この区間は保存済みの軌跡で終了します');
  DB.upsert(DB.key.re, { uuid:r.uuid, ended_at:nowISO(), track:pts.slice(),
    length_m_auto: Math.round(pathLength(pts)),
    end_lat: end[0]!=null?+end[0].toFixed(6):'', end_lon: end[1]!=null?+end[1].toFixed(6):'' });
  if(!TRACK || TRACK.reach_uuid===r.uuid) TRACK=null;
  toast(r.name+' を終了しました（'+fmtDist(pathLength(pts))+'）');
  render();
}

function startSurvey(u){
  const s = DB.survey(u); if(!s) return;

  const other = DB.surveys().find(x=>x.uuid!==u && x.status==='調査中');
  if(other && !confirm(`「${other.name}」がまだ調査中です。
そちらを終了して、この調査を始めますか？`)) return;
  if(other){ const cur=activeReach(other.uuid); if(cur) endReach(other.uuid);
    DB.upsert(DB.key.sv, {uuid:other.uuid, status:'終了', end_datetime:nowISO()}); }
  DB.upsert(DB.key.sv, { uuid:u, status:'調査中', start_datetime: s.start_datetime || nowISO() });
  startGps();
  toast('調査を開始しました');
  render();
}
function finishSurvey(u){

  const msg = cur ? `調査を終了しますか？\n記録中の ${cur.name} も終了します。（あとで再開できます）`
                  : '調査を終了しますか？（あとで再開できます）';
  if(!confirm(msg)) return;
  if(cur) endReach(u);
  DB.upsert(DB.key.sv, { uuid:u, status:'終了', end_datetime: nowISO() });
  stopGps();
  toast('調査を終了しました');
  render();
}
function reopenSurvey(u){
  DB.upsert(DB.key.sv, { uuid:u, status:'調査中', end_datetime:'' });
  startGps();
  toast('調査を再開しました');

}

// 声で言われた水深・流速を測点へ入れる。
// いまの最後の測点がその項目を空けていればそこへ、埋まっていれば新しい測点を足す
function envVoiceApply(hit){
  envSync();
  const list = SCREENS._env || [];
  let last = list[list.length-1];
  const busy = last && Object.keys(hit).some(k=>last[k]!=='' && last[k]!=null);
  if(!last || busy){
    last = {depth_cm:'', velocity_ms:'', note:''};
    list.push(last);
  }
  Object.keys(hit).forEach(k=>{ last[k] = parseFloat(hit[k]); });
  SCREENS._env = list;
  renderEnvList();
}

function setSegValue(field, value){
  const btns = $$(`[data-seg="${field}"] button`);
  const b = btns.find(x=>x.textContent===value);
  if(b){ pickSeg(b); return true; }
  return false;
}

function parseVoice(text){
  let t = String(text||'')
    .replace(/[０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
    .replace(/[．。]/g,'.').replace(/[、，]/g,' ').replace(/　/g,' ');
  const hits=[];

  // 数値つきの項目。「河床内水温」を「水温」より先に見るため、長い言葉から順に照合する
  const entries=[];
  VOICE_NUM_FIELDS.forEach(f=>f.words.forEach(w=>entries.push({f,w})));
  entries.sort((a,b)=>b.w.length-a.w.length);
  const filled=new Set();
  const envHit={};
  entries.forEach(({f,w})=>{
    const key = f.env || f.sel;
    if(filled.has(key)) return;
    const m = new RegExp(w+'\\s*[はがのをが]?\\s*(-?\\d+(?:\\.\\d+)?)').exec(t);
    if(!m) return;
    if(f.env){ envHit[f.env] = m[1]; }
    else { const el=$(f.sel); if(!el) return; el.value = m[1]; }
    filled.add(key);
    hits.push(`${f.label} ${m[1]}`);
    t = t.replace(m[0], ' ');
  });
  if(Object.keys(envHit).length) envVoiceApply(envHit);

  // 選択肢の項目
  VOICE_SEG_FIELDS.forEach(f=>{
    const pairs = f.options().map(o=>[o,o]).concat(Object.entries(f.aliases||{}));
    pairs.sort((a,b)=>b[0].length-a[0].length);
    for(const [key,val] of pairs){
      if(!t.includes(key)) continue;
      if(setSegValue(f.field, val)){ hits.push(val); t = t.replace(key,' '); }
      break;
    }
  });

  updateArea();
  // 拾えなかった言葉はメモへ回す（聞き取った内容を黙って捨てない）
  const rest = t.replace(/\s+/g,' ').trim();
  if(rest){
    const n=$('#fNote');
    if(n){ n.value = (n.value ? n.value+' ' : '') + rest; hits.push('メモ「'+rest+'」'); }
  }
  return hits;
}

let RECOG=null, LISTENING=false;
function voiceSupported(){ return !!(window.SpeechRecognition || window.webkitSpeechRecognition); }
function voiceStatus(msg){ const el=$('#voiceStatus'); if(el) el.textContent=msg; }
function toggleMic(){
  if(!voiceSupported()){ toast('この端末では声で入力できません'); return; }
  if(LISTENING){ try{ RECOG.stop(); }catch(e){} return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  RECOG = new SR();
  RECOG.lang='ja-JP'; RECOG.interimResults=true; RECOG.continuous=false;
  const gen = screenGen();
  RECOG.onresult = e=>{
    if(screenStale(gen)){ try{ RECOG.abort(); }catch(err){} return; }
    let fin='', mid='';
    for(let i=e.resultIndex; i<e.results.length; i++){
      const tr=e.results[i][0].transcript;
      if(e.results[i].isFinal) fin+=tr; else mid+=tr;
    }
    const pv=$('#voicePreview');
    if(pv) pv.innerHTML = esc(fin) + (mid?`<span class="muted"> ${esc(mid)}</span>`:'');
    if(fin){
      const hits = parseVoice(fin);
      voiceStatus(hits.length ? '入れました：'+hits.join(' ／ ') : '当てはまる項目がありませんでした');
    }
  };
  RECOG.onerror = e=>{
    voiceStatus(e.error==='no-speech' ? '声が聞き取れませんでした。もう一度どうぞ'
      : e.error==='network' ? 'ネットにつながっていないと使えません（端末による）'
      : '聞き取れませんでした（'+e.error+'）');
    stopMic();
  };
  RECOG.onend = stopMic;
  LISTENING=true;
  const b=$('#micBtn'); if(b) b.textContent='■ 停止';
  voiceStatus('聞いています…');
  try{ RECOG.start(); }catch(e){ stopMic(); }
}
function stopMic(){
  LISTENING=false;
  const b=$('#micBtn'); if(b) b.textContent='🎤 声で入力';
  if($('#voiceStatus') && $('#voiceStatus').textContent==='聞いています…') voiceStatus('');
}

  return `<div class="card">

      <button class="btn" id="micBtn" style="width:auto" onclick="toggleMic()">🎤 声で入力</button>
      <div class="grow tiny muted" id="voiceStatus">例：「水深25 流速0.4 中礫 サケ 新しい 長さ150 幅80」</div>
    </div>
    <div class="small" id="voicePreview" style="margin-top:8px"></div>
  </div>`;
}

   ============================================================ */
/* ---------- まわりの環境の測点（水深・流速を何点でも） ---------- */
// 古い記録（水深・流速が1つだけ）は、1点の測点として読み替える
function envPoints(r){
  // env_points が配列なら、たとえ空でもそれが正本。
  // （空を「未設定」と見なすと、測点を全部消して保存しても古い値が復活してしまう）
  if(Array.isArray(r.env_points)) return r.env_points.slice();
  if(num(r.depth_cm)!=null || num(r.velocity_ms)!=null)
    return [{ depth_cm:r.depth_cm??'', velocity_ms:r.velocity_ms??'', note:'' }];
  return [];
}
function envValues(r, field){
  return envPoints(r).map(p=>num(p[field])).filter(v=>v!=null);
}
function envMean(r, field){
  const v = envValues(r, field);
  return v.length ? +(v.reduce((a,b)=>a+b,0)/v.length).toFixed(2) : '';
}
// 調査全体・複数記録ぶんの測点をまとめる
function allEnvValues(list, field){
  const out=[];
  list.forEach(r=>envValues(r, field).forEach(v=>out.push(v)));
  return out;
}
function statLine(vals, unit, digits){
  if(!vals.length) return '—';
  const mn=Math.min(...vals), mx=Math.max(...vals);
  const av=vals.reduce((a,b)=>a+b,0)/vals.length;
  const d = digits==null?1:digits;
  return `平均 ${av.toFixed(d)}${unit}（${mn.toFixed(d)}〜${mx.toFixed(d)}${unit}・${vals.length}点）`;
}

/* 何を記録したか。
   record_targets を持たない古い記録は、中身から推定する（産卵床は必ず含める） */
function recordTargets(r){
  if(Array.isArray(r.record_targets) && r.record_targets.length) return r.record_targets.slice();
  const t = ['産卵床'];
  if(r.fish_present==='いる' || num(r.female_n) || num(r.male_n) || r.behavior) t.push('親魚');
  if(num(r.carcass_n)) t.push('ホッチャレ');
  return t;
}
function hasTarget(r, name){ return recordTargets(r).indexOf(name) >= 0; }
function targetLabel(r){ return recordTargets(r).join('＋'); }

function nextReddNo(sv, reachUuid){
  const list = DB.reddsOf(sv).filter(x=>(x.reach_uuid||'')===(reachUuid||''));
  return list.reduce((m,x)=>Math.max(m, parseInt(x.redd_no,10)||0), 0) + 1;
}
function reddArea(lenCm, widCm){
  if(lenCm===''||lenCm==null||widCm===''||widCm==null) return '';
  return +((lenCm*widCm)/10000).toFixed(3);
}

SCREENS.reddEdit = (argStr)=>{

  const sv = a.sv, editing = !!a.u;
  const s = DB.survey(sv); if(!s) return SCREENS.home();
  // 別の調査の引き継ぎは使わない（別河川の座標や区間が入ってしまうため）

  const cur = activeReach(sv);
  const reaches = DB.reachesOf(sv);

      ${voicePanelHtml()}

      <div class="sect">位置</div>
      <div class="two">
        <label class="field"><span class="lab">緯度</span>
          <input id="fLat" inputmode="decimal" value="${esc(r.latitude??'')}" oninput="markPosManual()"></label>
        <label class="field"><span class="lab">経度</span>

        <span class="tiny muted" style="display:block; margin:-2px 0 6px">

        <span class="tiny muted" style="display:block; margin:-2px 0 6px">

    onMount:()=>{

      if(draft) toast('書きかけを復元しました');

      SCREENS._posSrc = r.position_source||'';
      SCREENS._photos = (r.photos||[]).slice();
      renderPhotoPanel();
      SCREENS._env = envPoints(r);
      renderEnvList();
      updateArea();

// 選んだ対象に関係する欄だけ出す。選んでいない欄は隠すが、値は消さない
// （選び直せば元の入力がそのまま戻る）
function onTargetChange(){
  const sel = segMultiVal('target');
  $$('[data-part]').forEach(el=>{
    el.style.display = sel.indexOf(el.getAttribute('data-part'))>=0 ? '' : 'none';
  });
}

// 区間を変えたら、その区間での次の番号に振り直す（新規記録のときだけ）
function onReachChange(sv, editing){
  if(editing) return;
  const el=$('#fNo'); if(!el) return;
  el.value = nextReddNo(sv, $('#fReach').value||'');
}
/* ---------- 測点の入力欄（水深・流速） ---------- */
function numOf(el){
  if(!el) return '';
  const v=String(el.value).trim();
  if(v==='') return '';
  const n=parseFloat(v); return isNaN(n)?'':n;
}
// 画面に入力されている内容を SCREENS._env に取り込む（並べ替え・追加の前に必ず呼ぶ）
function envSync(){
  SCREENS._env = $$('#envList .envrow').map(row=>({
    depth_cm: numOf(row.querySelector('.envd')),
    velocity_ms: numOf(row.querySelector('.envv')),
    note: ((row.querySelector('.envn')||{}).value||'').trim(),
  }));
}
function envAdd(){
  envSync();
  SCREENS._env = (SCREENS._env||[]).concat([{depth_cm:'', velocity_ms:'', note:''}]);
  renderEnvList();
}
function envRemove(i){
  envSync();
  (SCREENS._env||[]).splice(i,1);
  renderEnvList();
}
function renderEnvList(){
  const box=$('#envList'); if(!box) return;
  const list = SCREENS._env||[];
  if(!list.length){
    box.innerHTML = `<div class="tiny muted" style="margin-bottom:8px">まだ測点がありません。必要なら下のボタンで足してください。</div>`;
    return;
  }
  box.innerHTML = list.map((p,i)=>`
    <div class="card envrow" style="padding:10px">
      <div class="row"><div class="grow small muted">測点 ${i+1}</div>
        <button class="btn ghost small" style="width:auto; padding:4px 10px" onclick="envRemove(${i})">削除</button></div>
      <div class="two" style="margin-top:8px">
        <label class="field" style="margin-bottom:8px"><span class="lab">水深（cm）</span>
          <input class="envd" type="number" step="1" inputmode="decimal" value="${esc(p.depth_cm??'')}"></label>
        <label class="field" style="margin-bottom:8px"><span class="lab">流速（m/s）</span>
          <input class="envv" type="number" step="0.01" inputmode="decimal" value="${esc(p.velocity_ms??'')}"></label>
      </div>
      <label class="field" style="margin-bottom:0"><span class="lab">場所の名前（任意）</span>
        <input class="envn" value="${esc(p.note||'')}" placeholder="例：産卵床の上／掘った窪み／盛り上がり"></label>
    </div>`).join('');
}

function updateArea(){
  const L=numVal('#fLen'), W=numVal('#fWid'), el=$('#areaOut');
  if(!el) return;
  const a = reddArea(L,W);
  el.textContent = a==='' ? '—' : a.toFixed(3)+' m²';
}
/* ---------- 位置の決め方（GPS／地図／手入力） ---------- */
// どうやって位置を決めたかを残す。GPSが荒れた記録を後で見分けられるようにするため
function posLabel(r){
  const src=r.position_source||'';
  if(src==='地図') return '地図で指定した位置';
  if(src==='手入力') return '手で入力した位置';
  if(r.gps_accuracy!=='' && r.gps_accuracy!=null) return 'GPSの位置（誤差 約'+r.gps_accuracy+'m）';
  return '位置が取れなくても保存できます';
}
function markPosManual(){
  SCREENS._posSrc='手入力'; SCREENS._acc='';
  const out=$('#accOut'); if(out) out.textContent='手で入力した位置';
}
function grabGps(auto){
  if(!navigator.geolocation){ toast('この端末では位置を取れません'); return; }
  const gen = screenGen();
  const out=$('#accOut'); if(out) out.textContent='位置を取得中…';
  navigator.geolocation.getCurrentPosition(p=>{
    lastFix={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy, t:Date.now()};
    if(screenStale(gen)) return;   // 待っている間に別の記録へ移っていたら書き込まない
    // 自動取得（画面を開いた直後）で、すでに地図や手入力で位置が決まっているなら上書きしない
    if(auto && (SCREENS._posSrc==='地図' || SCREENS._posSrc==='手入力')){
      if(out) out.textContent = posLabel({position_source:SCREENS._posSrc, gps_accuracy:SCREENS._acc})
        + '（現在地も取れています。使うなら「現在地を取り込む」）';
      return;
    }
    fillGps();
  }, ()=>{ if(screenStale(gen)) return;
    if(out) out.textContent='位置を取れませんでした。地図で指定するか、空欄のままでも保存できます'; },
  {enableHighAccuracy:true, timeout:15000, maximumAge:0});
}
function fillGps(){
  if(!lastFix) return;
  const la=$('#fLat'), lo=$('#fLon'), out=$('#accOut');
  if(la) la.value = lastFix.lat.toFixed(6);
  if(lo) lo.value = lastFix.lon.toFixed(6);
  SCREENS._acc = Math.round(lastFix.acc);
  SCREENS._posSrc = 'GPS';
  if(out) out.textContent = 'GPSの位置（誤差 約'+SCREENS._acc+'m）';
  if(PICKMAP) movePickMarker([lastFix.lat, lastFix.lon], true);
}

/* ---------- 入力画面に常に出しておく「位置を決める地図」 ---------- */
let PICKMAP=null, PICKMARKER=null;
function closePickMap(){
  if(PICKMAP){ try{ PICKMAP.remove(); }catch(e){} }
  PICKMAP=null; PICKMARKER=null;
}
function initPickMap(sv){
  if(typeof L==='undefined' || !$('#pickMap')) return;
  const lat=parseFloat($('#fLat').value), lon=parseFloat($('#fLon').value);
  const here = validPt([lat,lon]) ? [lat,lon]
             : (lastFix ? [lastFix.lat, lastFix.lon] : null);

  PICKMAP = L.map('pickMap', { zoomControl:true });
  applyBaseMap(PICKMAP, baseMapName());

  // 目印として、同じ調査の区間の線と記録済みの産卵床を薄く出す
  DB.reachesOf(sv).forEach(r=>{
    const pts=(r.track||[]).filter(validPt);
    if(pts.length>=2) L.polyline(pts, {color:'#4aa3dd', weight:3, opacity:.5}).addTo(PICKMAP);
  });
  const self = SCREENS._reddUuid;
  DB.reddsOf(sv).forEach(r=>{
    if(r.uuid===self) return;
    const p=[parseFloat(r.latitude), parseFloat(r.longitude)];
    if(!validPt(p)) return;
    L.circleMarker(p, {radius:5, color:'#9aa8b4', weight:1, fillOpacity:.35})
      .addTo(PICKMAP).bindTooltip(`No.${r.redd_no||'—'}`);
  });
  // 現在地（GPS）も薄く出す。ずれの大きさが目で見て分かるように精度の円つき
  if(lastFix){
    L.circle([lastFix.lat,lastFix.lon], {radius:Math.max(5,lastFix.acc), color:'#4aa3dd', weight:1, fillOpacity:.1}).addTo(PICKMAP);
    L.circleMarker([lastFix.lat,lastFix.lon], {radius:5, color:'#fff', weight:2, fillColor:'#4aa3dd', fillOpacity:1})
      .addTo(PICKMAP).bindTooltip('今いる場所（GPS）');
  }

  PICKMAP.setView(here || [43.5,142.5], here ? 18 : 9);
  if(here) movePickMarker(here, false, '');   // 既にある位置を置き直しただけ。決め方は変えない
  PICKMAP.on('click', e=>movePickMarker([e.latlng.lat, e.latlng.lng], false, '地図'));
  // 画面に入れた直後は大きさが確定していないことがあるので測り直す
  setTimeout(()=>{ if(PICKMAP) PICKMAP.invalidateSize(); }, 60);
}
// source: '地図'（タップ・ドラッグ）／'GPS'（現在地の取り込み）／''（表示だけ動かす）
function movePickMarker(pt, recenter, source){
  if(!PICKMAP) return;
  if(!PICKMARKER){
    PICKMARKER = L.marker(pt, {draggable:true, icon:reddPinIcon()}).addTo(PICKMAP);
    PICKMARKER.on('dragend', ()=>{ const p=PICKMARKER.getLatLng(); applyPickPos([p.lat, p.lng], '地図'); });
  }else{
    PICKMARKER.setLatLng(pt);
  }
  if(recenter) PICKMAP.setView(pt, Math.max(PICKMAP.getZoom(), 18));
  applyPickPos(pt, source);
}
function applyPickPos(pt, source){
  if(source===undefined) source='地図';   // 既定は地図で置いた扱い
  const la=$('#fLat'), lo=$('#fLon'), out=$('#accOut');
  if(la) la.value = (+pt[0]).toFixed(6);
  if(lo) lo.value = (+pt[1]).toFixed(6);
  // GPSで入れた時は精度と表示を fillGps 側が持つので、ここで上書きしない
  if(source==='地図'){
    SCREENS._acc = '';        // 地図で置いた点にGPSの誤差という考えは当てはまらない
    SCREENS._posSrc = '地図';
    if(out) out.textContent = '地図で指定した位置';
  }
}

function collectReddForm(){
  const when = $('#fWhen').value;

  return {
    record_targets: segMultiVal('target'),
    reach_uuid: $('#fReach').value||'',
    redd_no: numVal('#fNo'),
    observed_at: isNaN(d) ? nowISO() : d.toISOString(),
    latitude: ($('#fLat').value||'').trim(),
    longitude: ($('#fLon').value||'').trim(),
    river_form: segVal('riverForm'),
    species: segVal('species'),
    species_basis: segVal('basis'),
    age_class: segVal('age'),
    state: segVal('state'),
    length_cm: numVal('#fLen'), width_cm: numVal('#fWid'),
    substrate_main: segVal('subMain'), substrate_sub: segVal('subSub'),
    embeddedness: segVal('embedded'), cover: segVal('cover'),
    water_temp_c: numVal('#fWT'), intragravel_temp_c: numVal('#fIGT'), temp_depth_cm: numVal('#fTD'),
    female_n: numVal('#fFem'), male_n: numVal('#fMal'),
    behavior: segVal('behavior'), carcass_n: numVal('#fCar'),
    note: $('#fNote').value||'',
    needs_review: !!($('#fReview')&&$('#fReview').checked),
  };

function saveRedd(u, sv, editing, cont){
  const f = collectReddForm();
  if(!f.record_targets.length){ toast('この記録が何かを選んでください（産卵床・親魚・ホッチャレ）'); return; }
  envSync();
  // 何も入っていない測点は保存しない
  f.env_points = (SCREENS._env||[]).filter(p=>p.depth_cm!=='' || p.velocity_ms!=='' || p.note);
  f.depth_cm = ''; f.velocity_ms = '';   // 旧形式の値は残さない（測点が正本）
  const pos = parsePos(f.latitude, f.longitude);
  if(!pos.ok){ toast(pos.why); return; }
  f.area_m2 = reddArea(f.length_cm, f.width_cm);
  const prev = DB.get(DB.key.rd, u) || {};
  const rec = Object.assign({ uuid:u, survey_uuid:sv }, f,
    { gps_accuracy: SCREENS._acc!=null ? SCREENS._acc : (prev.gps_accuracy??''),
      position_source: SCREENS._posSrc!=null ? SCREENS._posSrc : (prev.position_source??''),
      photos: (SCREENS._photos||[]).slice() });
  if(!DB.upsert(DB.key.rd, rec)) return;
  editDraftClear(u);
  SCREENS._reddUuid = null;   // 保存済みなので、この画面の書きかけはもう控えない
  revokePhotoUrls();
  SCREENS._photos = null;

  // 次の記録に引き継ぐ値。同じ瀬では条件がほぼ同じなので入力を減らせる
  // 次の記録に引き継ぐのは「場の条件」だけ。
  // 水温のような実測値や、親魚を見たかどうかは引き継がない（測っていない値・
  // 見ていない親魚がそのまま記録されてしまうため）
  SCREENS._carry = { survey_uuid:sv, reach_uuid:f.reach_uuid, species:f.species,
    river_form:f.river_form, species_basis:f.species_basis,
    substrate_main:f.substrate_main, substrate_sub:f.substrate_sub,
    embeddedness:f.embeddedness, cover:f.cover };
  SCREENS._acc = null; SCREENS._posSrc = null;
  toast('保存しました');
  if(cont){ STACK.pop(); nav('reddEdit', JSON.stringify({sv})); }
  else goBack();
}
function deleteRedd(u){
  if(!confirm('この記録を削除しますか？')) return;
  editDraftClear(u); SCREENS._reddUuid = null;
  DB.softDelete(DB.key.rd, u);
  toast('ゴミ箱へ入れました');
  goBack();
}

/* ============================================================
   物理環境（河川構造ごとの区間）
   早瀬・平瀬・淵・瀬頭といったまとまりごとに、始点と終点を取り、
   その間の代表水深・代表流速・河床材料を記録する。
   産卵床の「点」の記録とは別物なので、別の一覧として持つ。
   ============================================================ */
function unitLength(u){
  if(u.length_m_manual!=='' && u.length_m_manual!=null) return +u.length_m_manual;
  return +u.length_m_auto || 0;
}
// 空欄を 0 と読み替えないための変換。空なら null を返す
// （`+''` は 0 になるため、そのまま使うと未入力が「緯度0・経度0」として地図に出てしまう）
// 位置の入力チェック。ok=false なら why に理由が入る
function parsePos(lat, lon){
  const sl=String(lat??'').trim(), so=String(lon??'').trim();
  if(sl==='' && so==='') return {ok:true, empty:true, lat:'', lon:''};
  const a=parseFloat(sl), b=parseFloat(so);
  if(sl!=='' && (isNaN(a)||Math.abs(a)>90))  return {ok:false, why:'緯度の値を確かめてください'};
  if(so!=='' && (isNaN(b)||Math.abs(b)>180)) return {ok:false, why:'経度の値を確かめてください'};
  return {ok:true, empty:false, lat:sl===''?'':a, lon:so===''?'':b};
}
function ptOf(lat, lon){
  if(lat===''||lat==null||lon===''||lon==null) return null;
  const p=[parseFloat(lat), parseFloat(lon)];
  return validPt(p) ? p : null;
}
function unitPointsOk(u){ return !!(ptOf(u.start_lat,u.start_lon) && ptOf(u.end_lat,u.end_lon)); }
// 割合の合計。100にならなくても保存はできるが、画面で気づけるようにする
function grainTotal(pct){
  return OPT.substrate.reduce((a,g)=>a + (num((pct||{})[g])||0), 0);
}
function grainMain(pct){
  let best='', v=-1;
  OPT.substrate.forEach(g=>{ const x=num((pct||{})[g]); if(x!=null && x>v){ v=x; best=g; } });
  return v>0 ? best : '';
}
function unitAutoName(sv, form){
  const n = DB.unitsOf(sv).filter(x=>x.river_form===form).length + 1;
  return (form||'区間') + n;
}

SCREENS.units = (sv)=>{

};

/* ---------- 物理環境の入力画面に出す地図 ---------- */
let UNITMAP=null, UNIT_MK={start:null, end:null}, UNIT_LINE=null, UNIT_MODE='start';
function closeUnitMap(){
  if(UNITMAP){ try{ UNITMAP.remove(); }catch(e){} }
  UNITMAP=null; UNIT_MK={start:null, end:null}; UNIT_LINE=null;
}
function unitPickMode(which){
  UNIT_MODE = which;
  const bs=$('#uPickStart'), be=$('#uPickEnd');
  if(bs) bs.classList.toggle('primary', which==='start');
  if(be) be.classList.toggle('primary', which==='end');
  toast(which==='start' ? '地図をタップすると始点を置きます' : '地図をタップすると終点を置きます');
}
function initUnitMap(sv, selfUuid){
  if(typeof L==='undefined' || !$('#unitMap')) return;
  UNITMAP = L.map('unitMap', { zoomControl:true });
  applyBaseMap(UNITMAP, baseMapName());

  // 目印：記録済みの区間と産卵床
  DB.unitsOf(sv).forEach(x=>{
    if(x.uuid===selfUuid) return;
    const a=ptOf(x.start_lat,x.start_lon), b=ptOf(x.end_lat,x.end_lon);
    if(!a||!b) return;
    L.polyline([a,b], {color:formColor(x.river_form), weight:6, opacity:.6}).addTo(UNITMAP)
      .bindTooltip(`${x.name||''}（${x.river_form||''}）`);
  });
  DB.reddsOf(sv).forEach(r=>{
    const p=ptOf(r.latitude, r.longitude);
    if(p) L.circleMarker(p, {radius:4, color:'#9aa8b4', weight:1, fillOpacity:.35}).addTo(UNITMAP);
  });
  if(lastFix){
    L.circleMarker([lastFix.lat,lastFix.lon], {radius:5, color:'#fff', weight:2,
      fillColor:'#4aa3dd', fillOpacity:1}).addTo(UNITMAP).bindTooltip('今いる場所（GPS）');
  }

  const s=ptOf($('#uSLat').value, $('#uSLon').value), e=ptOf($('#uELat').value, $('#uELon').value);
  const center = s || e || (lastFix?[lastFix.lat,lastFix.lon]:null);
  UNITMAP.setView(center || [43.5,142.5], center ? 17 : 9);
  if(s) unitSetPoint('start', s, false);
  if(e) unitSetPoint('end', e, false);
  // 始点が決まっていれば、次のタップは終点にするのが自然
  unitPickMode(s ? 'end' : 'start');
  UNITMAP.on('click', ev=>unitSetPoint(UNIT_MODE, [ev.latlng.lat, ev.latlng.lng], true));
  setTimeout(()=>{ if(UNITMAP) UNITMAP.invalidateSize(); }, 60);
}
function unitPinIcon(color){
  return L.divIcon({ className:'', iconSize:[24,24], iconAnchor:[12,12],
    html:`<div style="width:18px;height:18px;border-radius:50%;background:${color};
      border:3px solid #fff;box-shadow:0 0 0 2px rgba(0,0,0,.4)"></div>` });
}
// which: 'start'（緑）/ 'end'（赤）。advance=true なら始点を置いた後に終点モードへ進む
function unitSetPoint(which, pt, advance){
  if(!UNITMAP) return;
  const color = which==='start' ? '#4ec38a' : '#e05555';
  if(!UNIT_MK[which]){
    UNIT_MK[which] = L.marker(pt, {draggable:true, icon:unitPinIcon(color)}).addTo(UNITMAP)
      .bindTooltip(which==='start'?'始点':'終点');
    UNIT_MK[which].on('dragend', ()=>{
      const p=UNIT_MK[which].getLatLng();
      unitWritePoint(which, [p.lat, p.lng]);
      unitDrawLine();
    });
  }else{
    UNIT_MK[which].setLatLng(pt);
  }
  unitWritePoint(which, pt);
  unitDrawLine();
  if(advance && which==='start' && !UNIT_MK.end) unitPickMode('end');
}
function unitWritePoint(which, pt){
  const la = which==='start' ? $('#uSLat') : $('#uELat');
  const lo = which==='start' ? $('#uSLon') : $('#uELon');
  if(la) la.value = (+pt[0]).toFixed(6);
  if(lo) lo.value = (+pt[1]).toFixed(6);
  updateUnitLen();
}
function unitDrawLine(){
  if(!UNITMAP) return;
  const s=ptOf($('#uSLat').value, $('#uSLon').value), e=ptOf($('#uELat').value, $('#uELon').value);
  if(UNIT_LINE){ try{ UNITMAP.removeLayer(UNIT_LINE); }catch(err){} UNIT_LINE=null; }
  if(s && e) UNIT_LINE = L.polyline([s,e], {color:'#fff', weight:3, opacity:.9, dashArray:'6,6'}).addTo(UNITMAP);
}
function unitClearStart(){
  ['#uSLat','#uSLon'].forEach(s=>{ const el=$(s); if(el) el.value=''; });
  if(UNITMAP && UNIT_MK.start){ try{ UNITMAP.removeLayer(UNIT_MK.start); }catch(e){} UNIT_MK.start=null; }
  unitDrawLine();
  updateUnitLen();
  unitPickMode('start');
  toast('始点を消しました。地図か「今いる場所を始点に」で置き直せます');
}

function unitMark(which){
  if(!navigator.geolocation){ toast('この端末では位置を取れません'); return; }
  const gen = screenGen();
  toast('位置を取得中…');
  navigator.geolocation.getCurrentPosition(p=>{
    lastFix={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy, t:Date.now()};
    if(screenStale(gen)) return;
    if(UNITMAP) unitSetPoint(which, [lastFix.lat, lastFix.lon], false);
    else {
      const la = which==='start' ? $('#uSLat') : $('#uELat');
      const lo = which==='start' ? $('#uSLon') : $('#uELon');
      if(la) la.value = lastFix.lat.toFixed(6);
      if(lo) lo.value = lastFix.lon.toFixed(6);
      updateUnitLen();
    }
    toast((which==='start'?'始点':'終点')+'を記録しました（誤差 約'+Math.round(lastFix.acc)+'m）');
  }, ()=>toast('位置を取れませんでした'), {enableHighAccuracy:true, timeout:15000, maximumAge:0});
}
function unitStraightLength(){
  const s=[parseFloat($('#uSLat').value), parseFloat($('#uSLon').value)];
  const e=[parseFloat($('#uELat').value), parseFloat($('#uELon').value)];
  if(!validPt(s) || !validPt(e)) return null;
  return Math.round(distMeters(s,e));
}
function updateUnitLen(){
  const el=$('#uLenOut'); if(!el) return;
  const d = unitStraightLength();
  el.textContent = d==null ? '—' : fmtDist(d);
}
function unitRepFromPoints(){
  envSync();
  const fake = { env_points: SCREENS._env||[] };
  const d = envMean(fake,'depth_cm'), v = envMean(fake,'velocity_ms');
  if(d==='' && v===''){ toast('測点に水深・流速を入れてください'); return; }
  if(d!=='' && $('#uDep')) $('#uDep').value = d;
  if(v!=='' && $('#uVel')) $('#uVel').value = v;
  toast('測点の平均を代表値に入れました');
}
function collectGrainPct(){
  const out={};
  $$('.grainpct').forEach(el=>{
    const g = el.getAttribute('data-grain');
    const v = numOf(el);
    if(v!=='') out[g]=v;
  });
  return out;
}
function updateGrainTotal(){
  const el=$('#grainTotalOut'); if(!el) return;
  const pct = collectGrainPct();
  const keys = Object.keys(pct);
  if(!keys.length){ el.textContent='—'; el.style.color=''; return; }
  const t = grainTotal(pct);
  el.textContent = t+'％';
  // 100からずれていたら気づけるように色を変える（保存は止めない）
  el.style.color = Math.abs(t-100) < 0.01 ? 'var(--accent)' : 'var(--warn)';
}

function num(v){ return (v===''||v==null||isNaN(+v)) ? null : +v; }
function sumOf(list, field){
  return list.reduce((a,x)=>{ const v=num(x[field]); return v==null?a:a+v; }, 0);
}
function avgOf(list, field){
  const vs=list.map(x=>num(x[field])).filter(v=>v!=null);
  return vs.length ? vs.reduce((a,b)=>a+b,0)/vs.length : null;
}
function rangeOf(list, field){
  const vs=list.map(x=>num(x[field])).filter(v=>v!=null);
  return vs.length ? {min:Math.min(...vs), max:Math.max(...vs), n:vs.length} : null;
}
function countBy(list, field, fallback){
  const m=new Map();
  list.forEach(x=>{ const k=x[field]||fallback; m.set(k,(m.get(k)||0)+1); });
  return [...m.entries()].sort((a,b)=>b[1]-a[1]);
}
function fmtNum(v, d){ return v==null ? '—' : (+v).toFixed(d==null?1:d); }

// 区間ごとの集計。区間長は手入力があればそちらを使う
// 産卵床の数は「産卵床」を含む記録だけを数える。
// 親魚だけ・ホッチャレだけの記録を床数に混ぜると密度が過大になるため
function reachStats(sv){
  const all = DB.reddsOf(sv);
  const build = (name, list, len)=>{
    const redds = list.filter(x=>hasTarget(x,'産卵床'));
    return { name, len, n:redds.length,
      density: len>0 ? redds.length/len*100 : null,
      area: sumOf(redds,'area_m2'),
      fishOnly: list.filter(x=>!hasTarget(x,'産卵床') && hasTarget(x,'親魚')).length,
      carcass: sumOf(list.filter(x=>hasTarget(x,'ホッチャレ')),'carcass_n'),
      species: countBy(redds,'species','種不明') };
  };
  const rows = DB.reachesOf(sv).map(r=>
    build(r.name, all.filter(x=>x.reach_uuid===r.uuid), reachLength(r)));
  const noReach = all.filter(x=>!x.reach_uuid);
  if(noReach.length) rows.push(build('区間なし', noReach, 0));
  return rows;
}

/* ============================================================
   地図
   背景は国土地理院のタイル。既定は航空写真（瀬・淵や州の位置が見えるため）。
   一度表示した範囲はキャッシュされ、圏外でも同じ場所なら表示できる。
   ============================================================ */
const BASEMAPS = {
  '航空写真': { url:'https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', max:18 },
  '地形図'  : { url:'https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', max:18 },
  '淡色地図': { url:'https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', max:18 },
};
const GSI_ATTR = '<a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>';
function baseMapName(){ const v=localStorage.getItem('rd_basemap'); return BASEMAPS[v]?v:'航空写真'; }

/* ============================================================
   オフライン地図の保存（範囲を囲って先に落としておく）
   スクロール任せだと「どこまで保存できたか」が分からないので、
   四角で範囲を決めて、その中のタイルをまとめて保存する。
   保存分は Service Worker の PACK_CACHE に入り、自動では消えない。
   ============================================================ */
const PACK_MAXZOOM = 16;     // これ以上は落とさない（枚数が急増するため）
const PACK_MINZOOM = 12;     // 全体像が分かる粗さから
const PACK_TILE_KB = { '航空写真':20, '地形図':12, '淡色地図':10 };   // 見積り用の1枚あたりKB
const PACK_WARN_TILES = 12000;   // これを超えたら強く警告

// 緯度経度 → タイル番号
function lon2tx(lon,z){ return Math.floor((lon+180)/360*Math.pow(2,z)); }
function lat2ty(lat,z){ const r=lat*Math.PI/180;
  return Math.floor((1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z)); }

function packStore(){ try{ return JSON.parse(localStorage.getItem('rd_map_packs')||'[]'); }catch(e){ return []; } }
function packSave(list){ try{ localStorage.setItem('rd_map_packs', JSON.stringify(list)); }catch(e){} }

// bbox={s,w,n,e}, zmax, layers=['航空写真',...] から、落とすタイルURLの一覧を作る
function packTileUrls(bbox, zmax, layers){
  const urls=[];
  const zTop = Math.min(zmax, PACK_MAXZOOM);
  layers.forEach(name=>{
    const b=BASEMAPS[name]; if(!b) return;
    for(let z=PACK_MINZOOM; z<=zTop; z++){
      const x0=lon2tx(bbox.w,z), x1=lon2tx(bbox.e,z);
      const y0=lat2ty(bbox.n,z), y1=lat2ty(bbox.s,z);
      for(let x=Math.min(x0,x1); x<=Math.max(x0,x1); x++)
        for(let y=Math.min(y0,y1); y<=Math.max(y0,y1); y++)
          urls.push(b.url.replace('{z}',z).replace('{x}',x).replace('{y}',y));
    }
  });
  return urls;
}
// 見積り（枚数と、種類ごとの重みで概算したMB）
function packEstimate(bbox, zmax, layers){
  const urls = packTileUrls(bbox, zmax, layers);
  let kb=0;
  layers.forEach(name=>{
    const zTop=Math.min(zmax,PACK_MAXZOOM);
    for(let z=PACK_MINZOOM; z<=zTop; z++){
      const nx=Math.abs(lon2tx(bbox.e,z)-lon2tx(bbox.w,z))+1;
      const ny=Math.abs(lat2ty(bbox.s,z)-lat2ty(bbox.n,z))+1;
      kb += nx*ny*(PACK_TILE_KB[name]||15);
    }
  });
  return { count:urls.length, mb: kb/1024, urls };
}

// Service Worker への依頼（保存・計測・削除）。返事を待つ
function swAsk(msg, transferUrls){
  return new Promise((res,rej)=>{
    const sw = navigator.serviceWorker && navigator.serviceWorker.controller;
    if(!sw){ rej(new Error('no-sw')); return; }
    const ch = new MessageChannel();
    ch.port1.onmessage = e => res(e.data);
    sw.postMessage(msg, [ch.port2]);
  });
}
let PACK_DL = null;   // ダウンロード中の状態（中断用）

// 背景地図の切り替え。
// Leaflet 標準の切替コントロールは画像アイコン（images/layers.png）を使うが、
// その画像を同梱していないため「？」に化けて何のボタンか分からなかった。
// 画像に頼らず、地図名をそのまま出す文字ボタンにする。
function baseMapButtonsHtml(){
  const cur = baseMapName();
  return `<div class="seg basemap">` + Object.keys(BASEMAPS).map(n=>
    `<button type="button" class="${n===cur?'on':''}" onclick="switchBaseMap(this,'${n}')">${n}</button>`
  ).join('') + `</div>`;
}
// 画面に出ている地図をまとめて返す。ここを経由しないと、地図を増やしたときに切替が効かなくなる
function allMaps(){ return [MAP, PICKMAP, UNITMAP, OMAP].filter(Boolean); }
function applyBaseMap(map, name){
  if(!map) return;
  const b = BASEMAPS[name] || BASEMAPS['航空写真'];
  if(map._baseLayer){ try{ map.removeLayer(map._baseLayer); }catch(e){} }
  // crossOrigin を付けないと画像が「中身を見ない」応答になり、Service Worker が
  // タイルをキャッシュできず、圏外で背景地図が出なくなる（地理院タイルはCORS対応済み）
  map._baseLayer = L.tileLayer(b.url, {maxZoom:b.max, maxNativeZoom:b.max,
    crossOrigin:'anonymous', attribution:GSI_ATTR}).addTo(map);
  if(map._baseLayer.bringToBack) map._baseLayer.bringToBack();
}
function switchBaseMap(btn, name){

// 魚種は色、新旧は塗りの濃さで見分ける
const SPECIES_COLORS = ['#e05555','#4aa3dd','#4ec38a','#e0a030','#b070d0','#3fc0c0','#d06090','#9aa8b4'];
function speciesColor(name){
  const list = speciesList();
  const i = list.indexOf(name);
  return SPECIES_COLORS[(i<0 ? list.length : i) % SPECIES_COLORS.length];
}
// 河川形態ごとの色（物理環境の線に使う）
const FORM_COLORS = {'早瀬':'#e0a030','平瀬':'#4ec38a','淵':'#7a6fd0','瀬頭':'#e07050'};
function formColor(f){ return FORM_COLORS[f] || '#9aa8b4'; }

function ageOpacity(age){
  return age==='新しい' ? 0.95 : age==='やや古い' ? 0.6 : age==='古い' ? 0.2 : 0.45;
}

let OMAP=null, OMAP_RECT=null, OMAP_PTS=[];
function closeOfflineMap(){ if(OMAP){ try{ OMAP.remove(); }catch(e){} } OMAP=null; OMAP_RECT=null; OMAP_PTS=[]; }

      ${baseMapButtonsHtml()}
      <div id="omap"></div>
      <div class="btn-grid" style="margin-top:8px">

          onclick="pickSegMulti(this,'offlineEstimate')">${esc(n)}</button>`).join('')}
      </div>
      <div class="sect">細かさ（拡大の上限）</div>
      <label class="field"><span class="lab">これ以上は保存しません（枚数を抑えるため）</span>

function initOfflineMap(sv){
  closeOfflineMap();
  if(typeof L==='undefined' || !$('#omap')) return;
  OMAP = L.map('omap', { zoomControl:true });
  applyBaseMap(OMAP, baseMapName());
  // 記録済みの産卵床・区間を薄く出して、どこを保存すればいいか分かるように
  const group = L.featureGroup().addTo(OMAP);
  DB.reddsOf(sv).forEach(r=>{ const p=ptOf(r.latitude,r.longitude);
    if(p) L.circleMarker(p,{radius:4,color:'#9aa8b4',weight:1,fillOpacity:.4}).addTo(group); });
  DB.reachesOf(sv).forEach(r=>{ const pts=(r.track||[]).filter(validPt);
    if(pts.length>=2) L.polyline(pts,{color:'#4aa3dd',weight:3,opacity:.5}).addTo(group); });
  // 既に保存済みの範囲を四角で見せる
  packStore().forEach(p=>{ if(p.bbox)
    L.rectangle([[p.bbox.s,p.bbox.w],[p.bbox.n,p.bbox.e]],
      {color:'#4ec38a',weight:1,fillOpacity:.05,dashArray:'4,4'}).addTo(OMAP); });

  let center=[43.5,142.5], zoom=9;
  if(group.getLayers().length){ try{ const b=group.getBounds(); center=b.getCenter(); zoom=13; }catch(e){} }
  else if(lastFix){ center=[lastFix.lat,lastFix.lon]; zoom=13; }
  OMAP.setView(center, zoom);
  OMAP.on('click', e=>offlineAddCorner(e.latlng.lat, e.latlng.lng));
  setTimeout(()=>{ if(OMAP) OMAP.invalidateSize(); }, 60);
}
function offlineAddCorner(lat, lon){
  if(OMAP_PTS.length>=2) OMAP_PTS=[];   // 3回目のタップでやり直し
  OMAP_PTS.push([lat,lon]);
  offlineRedrawRect();
  if(OMAP_PTS.length===2) offlineEstimate();
}
function currentBbox(){
  if(OMAP_PTS.length!==2) return null;
  const [a,b]=OMAP_PTS;
  return { s:Math.min(a[0],b[0]), n:Math.max(a[0],b[0]), w:Math.min(a[1],b[1]), e:Math.max(a[1],b[1]) };
}
function offlineRedrawRect(){
  if(OMAP_RECT){ try{ OMAP.removeLayer(OMAP_RECT); }catch(e){} OMAP_RECT=null; }
  const bb=currentBbox();
  if(bb) OMAP_RECT=L.rectangle([[bb.s,bb.w],[bb.n,bb.e]],{color:'#e0a030',weight:2,fillOpacity:.1}).addTo(OMAP);
  else if(OMAP_PTS.length===1)
    OMAP_RECT=L.circleMarker(OMAP_PTS[0],{radius:6,color:'#e0a030',weight:2,fillColor:'#e0a030',fillOpacity:1}).addTo(OMAP);
}
function offlineUseView(){
  if(!OMAP) return;
  const b=OMAP.getBounds();
  OMAP_PTS=[[b.getSouth(),b.getWest()],[b.getNorth(),b.getEast()]];
  offlineRedrawRect(); offlineEstimate();
}
function offlineClearRect(){ OMAP_PTS=[]; offlineRedrawRect();
  const el=$('#omapEst'); if(el) el.innerHTML='<div class="small muted">四角を決めると、枚数と容量の見積りが出ます。</div>'; }
function offlineZoomMax(){ const v=segVal('omapZoom')||''; const m=v.match(/z(\d+)/); return m?+m[1]:PACK_MAXZOOM; }
function offlineLayers(){ const l=segMultiVal('omapLayers'); return l.length?l:[baseMapName()]; }
function offlineEstimate(){
  const el=$('#omapEst'); if(!el) return;
  const bb=currentBbox();
  if(!bb){ el.innerHTML='<div class="small muted">四角を決めると、枚数と容量の見積りが出ます。</div>'; return; }
  const est = packEstimate(bb, offlineZoomMax(), offlineLayers());
  const min = Math.max(1, Math.round(est.count/300));   // 控えめ並行での概算（1枚≈0.2秒相当）
  const warn = est.count>PACK_WARN_TILES;
  el.innerHTML = `<div class="small"><b>約 ${est.count.toLocaleString()} 枚 ／ 約 ${est.mb.toFixed(0)} MB</b>
    <span class="muted">（ダウンロード目安 ${min}分前後）</span></div>
    ${ warn ? `<div class="small" style="color:var(--warn); margin-top:6px">
      範囲が広い／細かすぎます。四角を小さくするか、細かさを下げると軽くなります。</div>` : '' }
    <div class="tiny muted" style="margin-top:6px">${esc(offlineLayers().join('・'))}／z${PACK_MINZOOM}〜${offlineZoomMax()}</div>`;
}
async function offlineSave(sv){
  const bb=currentBbox();
  if(!bb){ toast('先に地図で四角を決めてください'); return; }
  if(!(navigator.serviceWorker && navigator.serviceWorker.controller)){
    toast('この環境では保存できません（公開URLをホーム画面に追加して使ってください）'); return; }
  const layers=offlineLayers(), zmax=offlineZoomMax();
  const est=packEstimate(bb, zmax, layers);
  if(est.count > 40000){ alert('範囲が大きすぎます（約'+est.count.toLocaleString()+'枚）。四角を小さくするか、細かさを下げてください。'); return; }
  if(est.count > PACK_WARN_TILES && !confirm(`約 ${est.count.toLocaleString()} 枚（${est.mb.toFixed(0)}MB）を保存します。時間がかかり、端末の空きも使います。続けますか？`)) return;

  const btn=$('#omapSaveBtn'); if(btn){ btn.disabled=true; btn.textContent='保存中…'; }
  const prog=$('#omapProg');
  PACK_DL={ abort:false };
  const urls=est.urls, CH=60; let done=0, ok=0, fail=0;
  if(prog) prog.innerHTML=`<div class="card"><div class="small" id="omapProgTxt">準備中…</div>
    <button class="btn ghost small" style="margin-top:8px" onclick="offlineAbort()">中断</button></div>`;
  for(let i=0;i<urls.length && !PACK_DL.abort;i+=CH){
    const chunk=urls.slice(i,i+CH);
    try{ const r=await swAsk({type:'savePackTiles', urls:chunk}); ok+=r.ok||0; fail+=r.fail||0; }
    catch(e){ fail+=chunk.length; }
    done+=chunk.length;
    const t=$('#omapProgTxt');
    if(t) t.textContent=`${Math.min(done,urls.length).toLocaleString()} / ${urls.length.toLocaleString()} 枚`
      + (fail?`（取れなかった ${fail} 枚）`:'');
  }
  const aborted=PACK_DL.abort; PACK_DL=null;
  if(btn){ btn.disabled=false; btn.textContent='この範囲を保存'; }
  if(aborted){ toast('中断しました（そこまでの分は保存済みです）'); }
  else{
    // パックの記録を残す（一覧・削除・地図表示に使う）
    const list=packStore();
    list.unshift({ id:uuid(), name:(s=>s.river_name||s.name)(DB.survey(sv)||{}), bbox:bb,
      zmin:PACK_MINZOOM, zmax, layers, count:est.count, mb:est.mb, saved_at:nowISO() });
    packSave(list);
    toast(`保存しました（${ok.toLocaleString()}枚${fail?`／取れなかった ${fail}枚`:''}）`);
  }
  render();
}
function offlineAbort(){ if(PACK_DL) PACK_DL.abort=true; }
async function deleteMapPack(id){
  const list=packStore(); const p=list.find(x=>x.id===id); if(!p) return;
  if(!confirm(`「${p.name||'保存範囲'}」の地図（約${p.mb.toFixed(0)}MB）を消しますか？`)) return;
  try{ await swAsk({type:'deletePack', urls:packTileUrls(p.bbox, p.zmax, p.layers)}); }catch(e){}
  packSave(list.filter(x=>x.id!==id));
  toast('消しました');
  render();
}
async function offlineStats(){
  const el=$('#omapStats'); if(el) el.textContent='確認中…';
  try{ const r=await swAsk({type:'packStats'});
    if(el) el.textContent=`実際の保存量：${(r.count||0).toLocaleString()}枚 ／ ${((r.bytes||0)/1024/1024).toFixed(0)}MB`;
  }catch(e){ if(el) el.textContent='確認できませんでした'; }
}

function drawMap(sv){
  destroyMap();
  if(typeof L === 'undefined'){ toast('地図を読み込めませんでした'); return; }
  const redds = DB.reddsOf(sv).filter(r=>validPt([parseFloat(r.latitude), parseFloat(r.longitude)]));
  const reaches = DB.reachesOf(sv).filter(r=>(r.track||[]).filter(validPt).length>=2);
  const notes = DB.notesOf(sv).filter(n=>validPt([parseFloat(n.latitude), parseFloat(n.longitude)]));

  MAP = L.map('map', { zoomControl:true }).setView([43.5,142.5], 9);
  applyBaseMap(MAP, baseMapName());

  const group = L.featureGroup().addTo(MAP);

  reaches.forEach(r=>{
    const pts = (r.track||[]).filter(validPt);
    L.polyline(pts, { color:'#4aa3dd', weight:4, opacity:.8 }).addTo(group)
      .bindPopup(`<b>${esc(r.name)}</b><br>区間長 ${fmtDist(reachLength(r))}`);
  });

  // 物理環境の区間を、河川形態ごとの色の太い線で重ねる
  DB.unitsOf(sv).forEach(u=>{
    const a=ptOf(u.start_lat,u.start_lon), b=ptOf(u.end_lat,u.end_lon);
    if(!a || !b) return;
    L.polyline([a,b], { color:formColor(u.river_form), weight:7, opacity:.75, dashArray:'1,0' })
      .addTo(group)
      .bindPopup(`<b>${esc(u.name||'')}</b>（${esc(u.river_form||'')}）<br>
        区間長 ${fmtDist(unitLength(u))}<br>
        ${esc([num(u.depth_cm_rep)!=null?`代表水深 ${u.depth_cm_rep}cm`:'',
               num(u.velocity_ms_rep)!=null?`代表流速 ${u.velocity_ms_rep}m/s`:'',
               u.substrate_rep||grainMain(u.substrate_pct)||''].filter(Boolean).join(' ／ '))}<br>
        <a href="#" onclick="nav('unitEdit','${esc(JSON.stringify({sv, u:u.uuid}))}'); return false;">この記録を開く</a>`);
  });

  redds.forEach(r=>{
    const col = speciesColor(r.species);
    const pos = [parseFloat(r.latitude), parseFloat(r.longitude)];
    const size = hasTarget(r,'産卵床') && r.length_cm!=='' && r.width_cm!=='' ? `${r.length_cm}×${r.width_cm}cm` : '';
    const popup = `<b>${esc(r.reach_uuid?reachName(sv,r.reach_uuid):'区間なし')} No.${esc(r.redd_no||'—')}</b>
      <br>${esc(targetLabel(r))}<br>
      ${esc([r.species||'種不明', hasTarget(r,'産卵床')?r.age_class:'', hasTarget(r,'産卵床')?r.state:'', size]
            .filter(Boolean).join(' ／ '))}<br>
      <a href="#" onclick="closeMapPopupAndEdit('${sv}','${r.uuid}'); return false;">この記録を開く</a>`;

    // 産卵床＝丸、親魚のみ＝四角、ホッチャレのみ＝×。種類が形で分かるようにする
    let layer;
    if(hasTarget(r,'産卵床')){
      layer = L.circleMarker(pos, { radius:8, color:col, weight:2, fillColor:col,
                                    fillOpacity:ageOpacity(r.age_class) });
    }else if(hasTarget(r,'親魚')){
      layer = L.marker(pos, { icon: L.divIcon({ className:'', iconSize:[18,18], iconAnchor:[9,9],
        html:`<div style="width:14px;height:14px;background:${col};border:2px solid #fff"></div>` }) });
    }else{
      layer = L.marker(pos, { icon: L.divIcon({ className:'', iconSize:[18,18], iconAnchor:[9,9],
        html:`<div style="color:#fff;font-weight:700;font-size:15px;line-height:14px;
          text-shadow:0 0 3px #000">✕</div>` }) });
    }
    layer.addTo(group).bindPopup(popup);
  });

  notes.forEach(n=>{
    L.marker([parseFloat(n.latitude), parseFloat(n.longitude)], {
      icon: L.divIcon({ className:'', iconSize:[16,16], iconAnchor:[8,8],
        html:`<div style="width:14px;height:14px;background:#e0a030;border:2px solid #fff;border-radius:3px"></div>` })
    }).addTo(group).bindPopup(`<b>${esc(n.category||'メモ')}</b><br>${esc((n.content||'').slice(0,80))}`);
  });

  if(group.getLayers().length){
    try{ MAP.fitBounds(group.getBounds().pad(0.2), {maxZoom:17}); }catch(e){}
  }
  // GPSがずれている時のために、地図をタップした場所で新しい記録を始められるようにする
  MAP.on('click', e=>{
    if(!MAP_ADD_MODE) return;
    MAP_ADD_MODE=false;
    nav('reddEdit', JSON.stringify({sv, lat:+e.latlng.lat.toFixed(6), lon:+e.latlng.lng.toFixed(6)}));
  });

  addLocateControl();
  if(lastFix) showCurrentPos();
  renderLegend(sv);
}

let MAP_ADD_MODE=false;
function toggleMapAdd(){
  MAP_ADD_MODE = !MAP_ADD_MODE;
  const b=$('#mapAddBtn');
  if(b){
    b.textContent = MAP_ADD_MODE ? '追加をやめる' : '＋ 地図をタップして記録を追加';
    b.classList.toggle('primary', MAP_ADD_MODE);
  }
  if(MAP_ADD_MODE) toast('産卵床のある場所を地図でタップしてください');
}

function closeMapPopupAndEdit(sv, u){
  nav('reddEdit', JSON.stringify({sv, u}));
}

function showCurrentPos(){
  if(!MAP || !lastFix) return;
  if(MAP_LOCATE){ try{ MAP.removeLayer(MAP_LOCATE); }catch(e){} }
  MAP_LOCATE = L.layerGroup([
    L.circle([lastFix.lat,lastFix.lon], { radius:Math.max(5,lastFix.acc), color:'#4aa3dd', weight:1, fillOpacity:.12 }),
    L.circleMarker([lastFix.lat,lastFix.lon], { radius:6, color:'#fff', weight:2, fillColor:'#4aa3dd', fillOpacity:1 })
  ]).addTo(MAP);
}
function addLocateControl(){
  const target = MAP;   // 画面を切り替えた後に古い地図を触らないよう、この時点の地図を覚えておく
  const C = L.Control.extend({
    options:{ position:'topleft' },
    onAdd(){
      // 絵文字は端末によって「？」に化けるので文字で出す
      const b = L.DomUtil.create('button','locate-btn');
      b.textContent='現在地'; b.title='現在地へ移動';
      L.DomEvent.on(b,'click', L.DomEvent.stop).on(b,'click',()=>{
        if(!navigator.geolocation){ toast('この端末では位置を取れません'); return; }
        toast('現在地を探しています…');
        navigator.geolocation.getCurrentPosition(p=>{
          lastFix={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy, t:Date.now()};
          if(MAP!==target) return;
          showCurrentPos();
          target.setView([lastFix.lat,lastFix.lon], Math.max(target.getZoom(),16));
        }, ()=>toast('現在地を取れませんでした'), {enableHighAccuracy:true, timeout:15000});
      });
      return b;
    }
  });
  MAP.addControl(new C());
}

function renderLegend(sv){
  const box=$('#legend'); if(!box) return;
  const used = [...new Set(DB.reddsOf(sv).map(r=>r.species||'種不明'))];
  const sp = used.map(n=>`<span class="badge" style="border-color:${speciesColor(n==='種不明'?'':n)}">
      <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${speciesColor(n==='種不明'?'':n)};margin-right:6px"></span>${esc(n)}</span>`).join(' ');
  const age = OPT.age.map(a=>`<span class="badge">
      <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#9aa8b4;opacity:${ageOpacity(a)};margin-right:6px"></span>${esc(a)}</span>`).join(' ');
  const kind = `<span class="badge">● 産卵床</span> <span class="badge">■ 親魚のみ</span> <span class="badge">✕ ホッチャレのみ</span>`;
  const forms = OPT.riverForm.map(f=>`<span class="badge">
      <span style="display:inline-block;width:16px;height:5px;background:${formColor(f)};margin-right:6px;vertical-align:middle"></span>${esc(f)}</span>`).join(' ');
  box.innerHTML = `<div class="small muted">記録の種類（形）</div><div style="margin:6px 0 10px">${kind}</div>
    <div class="small muted">物理環境の区間（太い線の色）</div><div style="margin:6px 0 10px">${forms}</div>
    <div class="small muted">魚種（色）</div><div style="margin:6px 0 10px">${sp||'—'}</div>

/* ============================================================
   書き出し（CSV / GeoJSON / 写真ZIP / バックアップ）
   列の定義は1か所にまとめ、CSVもGeoJSONも同じものを見る（食い違いを防ぐため）。
   ============================================================ */
function download(filename, text, mime){
  downloadBlob(filename, new Blob([text], {type: mime||'text/plain;charset=utf-8'}));
}
function downloadBlob(filename, blob){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 3000);
}
function csvCell(v){
  v = v==null ? '' : String(v);
  // Excelの数式として解釈されるのを防ぐ。ただし数値（マイナスの緯度経度など）はそのまま通す
  if(/^[=+\-@\t\r]/.test(v) && !/^[+-]?\d+(\.\d+)?$/.test(v)) v = "'"+v;
  return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v;
}
function toCsv(cols, rows){
  return [cols.join(',')].concat(rows.map(r=>cols.map(c=>csvCell(r[c])).join(','))).join('\r\n');
}
function photoFilename(rec, i, p){ return `${rec.uuid}_${i+1}.${(p&&p.ext)||'jpg'}`; }
function exportBase(surveys){
  return surveys.length===1
    ? `ReddSurvey_${(surveys[0].survey_date||'').replace(/-/g,'')}_${(surveys[0].river_name||'').replace(/[\\/:*?"<>|\s]/g,'')}`
    : `ReddSurvey_${dateValue().replace(/-/g,'')}`;
}
