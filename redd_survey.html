/* ---------- 測点（水深・流速）を1点1行で ---------- */
// 産卵床の記録にも物理環境にも測点が付くので、どちらのものかを parent_type で示す
const ENVPOINT_COLS = ['survey_id','survey_name','survey_date','river_name','reach_id','reach_name',
  'parent_type','parent_id','parent_name','river_form','point_no','point_note','depth_cm','velocity_ms'];
function envPointRows(surveys){
  const rows=[];
  surveys.forEach(s=>{
    const reaches = DB.reachesOf(s.uuid);
    const push=(parent_type, id, name, form, list)=>{
      list.forEach((p,i)=>rows.push({ survey_id:s.uuid, survey_name:s.name,
        survey_date:fmtDate(s.survey_date), river_name:s.river_name,
        reach_id:'', reach_name:'', parent_type, parent_id:id, parent_name:name, river_form:form||'',
        point_no:i+1, point_note:p.note||'', depth_cm:p.depth_cm??'', velocity_ms:p.velocity_ms??'' }));
    };
    DB.reddsOf(s.uuid).forEach(r=>{
      const re = reaches.find(x=>x.uuid===r.reach_uuid);
      const before = rows.length;
      push('産卵床記録', r.uuid, `No.${r.redd_no??''} ${targetLabel(r)}`, r.river_form, envPoints(r));
      for(let i=before;i<rows.length;i++){ rows[i].reach_name = re?re.name:''; rows[i].reach_id = r.reach_uuid||''; }
    });
    DB.unitsOf(s.uuid).forEach(u=>{
      const re = reaches.find(x=>x.uuid===u.reach_uuid);
      const before = rows.length;
      push('物理環境', u.uuid, u.name||'', u.river_form, envPoints(u));
      for(let i=before;i<rows.length;i++){ rows[i].reach_name = re?re.name:''; rows[i].reach_id = u.reach_uuid||''; }
    });
  });
  return rows;
}

function exportCSV(surveys){
  const base = exportBase(surveys);
  const rr = reddRows(surveys), er = reachRows(surveys), ep = envPointRows(surveys),
        ur = unitRows(surveys), nr = noteRows(surveys);

  // Excelで文字化けしないよう先頭にBOMを付ける

  if(er.length) download(`${base}_reaches.csv`, '﻿'+toCsv(REACH_COLS, er), 'text/csv;charset=utf-8');
  if(ur.length) download(`${base}_habitat_units.csv`, '﻿'+toCsv(unitCols(), ur), 'text/csv;charset=utf-8');
  if(nr.length) download(`${base}_notes.csv`, '﻿'+toCsv(NOTE_COLS, nr), 'text/csv;charset=utf-8');
  // 水深・流速は1つの記録に何点でも入るので、1点1行の表も別に出す
  if(ep.length) download(`${base}_env_points.csv`, '﻿'+toCsv(ENVPOINT_COLS, ep), 'text/csv;charset=utf-8');
  toast('CSVを書き出しました');
}

function exportGeoJSON(surveys){
  const base = exportBase(surveys);
  const pts = reddRows(surveys)
    .filter(r=>validPt([parseFloat(r.latitude), parseFloat(r.longitude)]))
    .map(r=>({ type:'Feature',
      geometry:{ type:'Point', coordinates:[parseFloat(r.longitude), parseFloat(r.latitude)] },
      properties: REDD_COLS.reduce((p,c)=>{ p[c]=r[c]; return p; }, {}) }));

  const lines=[];
  surveys.forEach(s=>{
    const redds = DB.reddsOf(s.uuid);
    DB.reachesOf(s.uuid).forEach(r=>{
      const pathPts=(r.track||[]).filter(validPt);
      if(pathPts.length<2) return;
      // 属性はCSVと同じ列定義を使う（片方だけ直して食い違うのを防ぐ）
      const row = reachRows([s]).find(x=>x.reach_id===r.uuid) || {};
      lines.push({ type:'Feature',
        geometry:{ type:'LineString', coordinates: pathPts.map(p=>[p[1],p[0]]) },   // GeoJSONは経度,緯度の順
        properties: REACH_COLS.reduce((p,c)=>{ p[c]=row[c]; return p; }, {}) });
    });
  });

  // 物理環境は始点→終点の線として出す（QGISで河川構造ごとに見られる）
  const units=[];
  surveys.forEach(s=>{
    unitRows([s]).forEach(row=>{
      const a=ptOf(row.start_lat, row.start_lon), b=ptOf(row.end_lat, row.end_lon);
      if(!a || !b) return;
      units.push({ type:'Feature',
        geometry:{ type:'LineString', coordinates:[[a[1],a[0]],[b[1],b[0]]] },
        properties: unitCols().reduce((p,c)=>{ p[c]=row[c]; return p; }, {}) });
    });
  });
  if(units.length) download(`${base}_habitat_units.geojson`,
    JSON.stringify({type:'FeatureCollection', features:units}, null, 1), 'application/geo+json');

  // 位置のついたメモも点として出す
  const noteFeats = noteRows(surveys)
    .filter(n=>ptOf(n.latitude, n.longitude))
    .map(n=>{ const p=ptOf(n.latitude, n.longitude);
      return { type:'Feature', geometry:{ type:'Point', coordinates:[p[1],p[0]] },
        properties: NOTE_COLS.reduce((o,c)=>{ o[c]=n[c]; return o; }, {}) }; });
  if(noteFeats.length) download(`${base}_notes.geojson`,
    JSON.stringify({type:'FeatureCollection', features:noteFeats}, null, 1), 'application/geo+json');

  if(!pts.length && !lines.length && !units.length && !noteFeats.length){ toast('位置のついた記録がありません'); return; }
  if(pts.length) download(`${base}_redds.geojson`,
    JSON.stringify({type:'FeatureCollection', features:pts}, null, 1), 'application/geo+json');
  if(lines.length) download(`${base}_reaches.geojson`,
    JSON.stringify({type:'FeatureCollection', features:lines}, null, 1), 'application/geo+json');
  toast('GeoJSONを書き出しました（座標系 EPSG:4326）');
}

/* ---------- 写真ZIP（無圧縮・追加ライブラリ不要） ---------- */
function crc32(u8){ let c=~0>>>0;
  for(let i=0;i<u8.length;i++){ c^=u8[i]; for(let k=0;k<8;k++) c=(c>>>1)^(0xEDB88320 & -(c&1)); }
  return (~c)>>>0; }
function buildZip(files){
  const enc=new TextEncoder(); const parts=[]; const central=[]; let offset=0;
  const u16=n=>[n&255,(n>>8)&255], u32=n=>[n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255];
  files.forEach(f=>{
    const name=enc.encode(f.name), data=f.u8, crc=crc32(data);
    const lh=[].concat([0x50,0x4b,0x03,0x04], u16(20), u16(0x0800), u16(0), u16(0), u16(0),
      u32(crc), u32(data.length), u32(data.length), u16(name.length), u16(0));
    parts.push(new Uint8Array(lh), name, data);
    const ch=[].concat([0x50,0x4b,0x01,0x02], u16(20), u16(20), u16(0x0800), u16(0), u16(0), u16(0),
      u32(crc), u32(data.length), u32(data.length), u16(name.length), u16(0), u16(0), u16(0), u16(0),
      u32(0), u32(offset));
    central.push({head:new Uint8Array(ch), name});
    offset += lh.length + name.length + data.length;
  });
  const cdStart=offset; let cdSize=0;
  central.forEach(c=>{ parts.push(c.head, c.name); cdSize += c.head.length + c.name.length; });
  parts.push(new Uint8Array([].concat([0x50,0x4b,0x05,0x06], u16(0), u16(0),
    u16(central.length), u16(central.length), u32(cdSize), u32(cdStart), u16(0))));
  return new Blob(parts, {type:'application/zip'});
}
async function exportPhotoZip(surveys){
  const items=[];
  surveys.forEach(s=>{
    DB.reddsOf(s.uuid).forEach(r=>(r.photos||[]).forEach((p,i)=>items.push({s, rec:r, p, i, kind:'産卵床'})));
    DB.notesOf(s.uuid).forEach(n=>(n.photos||[]).forEach((p,i)=>items.push({s, rec:n, p, i, kind:'メモ'})));
  });
  if(!items.length){ toast('書き出す写真がありません'); return; }
  const total = items.reduce((a,it)=>a+((it.p&&it.p.size)||0), 0);
  const GB=1024*1024*1024;
  if(total >= 1.5*GB){ toast('写真が多すぎてZIPを作れません（約'+(total/GB).toFixed(1)+'GB）。調査ごとに分けて書き出してください'); return; }
  if(total >= 0.5*GB && !confirm('約'+(total/GB).toFixed(1)+'GBあります。時間がかかり、端末によっては失敗します。続けますか？')) return;

  toast('写真をまとめています…');
  const files=[], idx=[];
  for(const it of items){
    let rec=null; try{ rec=await PhotoDB.get(it.p.id); }catch(e){}
    if(!rec||!rec.blob) continue;
    const name = photoFilename(it.rec, it.i, it.p);
    files.push({ name, u8:new Uint8Array(await rec.blob.arrayBuffer()) });
    idx.push({ file:name, type:it.kind, survey_name:it.s.name,
      redd_no:it.rec.redd_no??'', observed_at:it.rec.observed_at||it.rec.recorded_at||'',
      latitude:it.rec.latitude??'', longitude:it.rec.longitude??'' });
  }
  if(!files.length){ toast('写真の中身が見つかりませんでした'); return; }
  const cols=['file','type','survey_name','redd_no','observed_at','latitude','longitude'];
  files.push({ name:'index.csv', u8:new TextEncoder().encode('﻿'+toCsv(cols, idx)) });
  downloadBlob(`${exportBase(surveys)}_photos.zip`, buildZip(files));
  toast('写真ZIPを書き出しました');
}

/* ---------- バックアップと復元 ---------- */
const CORE_KEYS = ['sv','re','rd','nt','un'];
function buildBackup(){
  const data={};
  CORE_KEYS.forEach(k=>{ data[DB.key[k]] = DB.loadRaw(DB.key[k]); });   // 消したものも含めて丸ごと
  return { app:'redd_survey', version:APP_VERSION, exported_at:nowISO(),
           species: speciesList(), data };
}
// バックアップの中身をユーザーに見せる文言（キーの並びに依存しないよう名前で作る）
const CORE_LABEL = { sv:'調査', re:'区間', rd:'記録', nt:'メモ', un:'物理環境' };
function backupCounts(b){
  return CORE_KEYS.map(k=>`${CORE_LABEL[k]} ${(b.data[DB.key[k]]||[]).length}`).join(' / ');
}
function exportBackup(){
  let b; try{ b=buildBackup(); }
  catch(e){ toast('保存データを読めませんでした。復元は行わないでください'); return; }
  download(`reddsurvey_backup_${dateValue().replace(/-/g,'')}.json`, JSON.stringify(b), 'application/json');
  toast('記録のバックアップを書き出しました（写真は含みません）');
}

/* 写真ごとのまるごとバックアップ。
   記録(backup.json)と写真の実体を1つのZIPに入れ、同じZIPから丸ごと戻せるようにする。
   機種変更のときはこれ1つあればよい。 */
async function exportFullBackup(){
  let b; try{ b=buildBackup(); }
  catch(e){ toast('保存データを読めませんでした。復元は行わないでください'); return; }

  // 参照されている写真だけを集める（消した記録のぶんも含めて、戻せるように）
  const ids=[];
  CORE_KEYS.forEach(k=>{
    (b.data[DB.key[k]]||[]).forEach(x=>(x.photos||[]).forEach(p=>{ if(p&&p.id) ids.push(p.id); }));
  });
  const uniq=[...new Set(ids)];
  toast('まとめています…');
  const files=[{ name:'backup.json', u8:new TextEncoder().encode(JSON.stringify(b)) }];
  const manifest=[];
  let total=0, missing=0;
  for(const id of uniq){
    let rec=null; try{ rec=await PhotoDB.get(id); }catch(e){}
    if(!rec||!rec.blob){ missing++; continue; }
    const name = `photos/${id}.${rec.ext||'jpg'}`;
    files.push({ name, u8:new Uint8Array(await rec.blob.arrayBuffer()) });
    manifest.push({ id, file:name, ext:rec.ext||'jpg', type:(rec.blob.type||'') });
    total += rec.blob.size||0;
  }
  const GB=1024*1024*1024;
  if(total >= 1.5*GB){ toast('写真が多すぎてまとめられません（約'+(total/GB).toFixed(1)+'GB）。調査ごとに書き出してください'); return; }
  files.push({ name:'photos.json', u8:new TextEncoder().encode(JSON.stringify(manifest)) });
  downloadBlob(`reddsurvey_full_${dateValue().replace(/-/g,'')}.zip`, buildZip(files));
  toast(`写真ごと書き出しました（写真 ${manifest.length} 枚${missing?`／見つからない ${missing} 枚`:''}）`);
}

// 記録の取り込み（JSONでもZIPの中のbackup.jsonでも同じ処理を通す）
function applyBackup(b){
  if(!b || b.app!=='redd_survey' || !b.data){ toast('このアプリのバックアップではありません'); return null; }
  let added=0, updated=0, ok=true;
  CORE_KEYS.forEach(k=>{
    const key=DB.key[k];
    const map=new Map(DB.load(key).map(x=>[x.uuid,x]));
    (b.data[key]||[]).forEach(x=>{
      if(!x || !x.uuid) return;
      const old=map.get(x.uuid);
      if(!old){ map.set(x.uuid,x); added++; }
      else if(String(x.updated_at||'') > String(old.updated_at||'')){ map.set(x.uuid,x); updated++; }
    });
    if(!DB.save(key, [...map.values()])) ok=false;
  });
  if(Array.isArray(b.species) && b.species.length) speciesSave(b.species);
  return {added, updated, ok};
}
function importBackup(input){
  const f=(input.files||[])[0]; input.value='';
  if(!f) return;
  if(/\.zip$/i.test(f.name||'')){ importFullBackup(f); return; }
  const rd=new FileReader();
  rd.onload=()=>{
    let b; try{ b=JSON.parse(rd.result); }catch(e){ toast('ファイルを読めませんでした'); return; }
    if(!b || b.app!=='redd_survey' || !b.data){ toast('このアプリのバックアップではありません'); return; }
    if(!confirm(`取り込みますか？\n${backupCounts(b)}\n\n同じ記録は新しい方（更新日時が後）を残します。`)) return;
    const r = applyBackup(b);
    if(!r) return;
    if(!r.ok){ alert('取り込みの途中で保存できませんでした。端末の空き容量を確認してください。'); }
    toast(`取り込みました（新規 ${r.added} / 更新 ${r.updated}）`);
    reset('home');
  };
  rd.readAsText(f);
}
async function importFullBackup(file){
  let entries;
  try{ entries = parseStoredZip(await file.arrayBuffer()); }
  catch(e){ toast('ZIPを読めませんでした'); return; }
  const dec=new TextDecoder();
  const jsonEntry = entries.find(x=>x.name==='backup.json');
  if(!jsonEntry){ toast('このZIPにはバックアップが入っていません'); return; }
  let b; try{ b=JSON.parse(dec.decode(jsonEntry.data)); }catch(e){ toast('中身を読めませんでした'); return; }
  if(!b || b.app!=='redd_survey' || !b.data){ toast('このアプリのバックアップではありません'); return; }
  const photos = entries.filter(x=>x.name.indexOf('photos/')===0);
  if(!confirm(`取り込みますか？\n${backupCounts(b)}／写真 ${photos.length} 枚\n\n同じ記録は新しい方（更新日時が後）を残します。`)) return;

  toast('取り込んでいます…');
  let saved=0, failed=0;
  for(const e of photos){
    const id = e.name.replace(/^photos\//,'').replace(/\.[^.]+$/,'');
    const ext = (e.name.match(/\.([^.]+)$/)||[])[1] || 'jpg';
    try{
      const cur = await PhotoDB.get(id);
      if(cur && cur.blob){ saved++; continue; }   // すでにある写真はそのまま
      await PhotoDB.put({ id, blob:new Blob([e.data], {type: extMime(ext)}), ext,
                          size:e.data.length, added_at:nowISO() });
      saved++;
    }catch(err){ console.error(err); failed++; }
  }
  const r = applyBackup(b);
  if(!r) return;
  if(!r.ok || failed) alert(`取り込みに一部失敗しました（写真 ${failed} 枚）。端末の空き容量を確認してください。`);
  toast(`取り込みました（新規 ${r.added} / 更新 ${r.updated} / 写真 ${saved} 枚）`);
  reset('home');
}
function extMime(ext){
  return ext==='png' ? 'image/png' : ext==='webp' ? 'image/webp'
       : (ext==='heic'||ext==='heif') ? 'image/heic' : 'image/jpeg';
}
// 無圧縮ZIPを読み解く（buildZip で作ったものが対象）
function parseStoredZip(buf){
  const dv=new DataView(buf), u8=new Uint8Array(buf), out=[]; let i=0;
  while(i < u8.length-3){
    if(dv.getUint32(i, true) !== 0x04034b50) break;
    const nameLen=dv.getUint16(i+26, true), extraLen=dv.getUint16(i+28, true);
    const size=dv.getUint32(i+18, true);
    const nameStart=i+30;
    const name=new TextDecoder().decode(u8.subarray(nameStart, nameStart+nameLen));
    const dataStart=nameStart+nameLen+extraLen;
    out.push({ name, data:u8.subarray(dataStart, dataStart+size) });
    i = dataStart + size;
  }
  return out;
}

/* ---------- 書き出し画面 ---------- */
SCREENS.exportHub = (svUuid)=>{
  const one = svUuid ? DB.survey(svUuid) : null;
  const surveys = one ? [one] : DB.surveys();
  const arg = svUuid ? `'${svUuid}'` : `''`;
  const nRedd = surveys.reduce((a,s)=>a+DB.reddsOf(s.uuid).length, 0);
  const nPhoto = surveys.reduce((a,s)=>
    a + DB.reddsOf(s.uuid).reduce((b,r)=>b+(r.photos||[]).length,0)
      + DB.notesOf(s.uuid).reduce((b,n)=>b+(n.photos||[]).length,0), 0);
  return {
    title: one ? 'この調査を書き出す' : 'データの書き出し',
    sub:[{text: one ? one.name : `調査 ${surveys.length}件`}],
    html:`
      <div class="card"><div class="small muted">対象</div>
        <div>${esc(one? one.name : `すべての調査（${surveys.length}件）`)}</div>
        <div class="small muted" style="margin-top:6px">産卵床 ${nRedd} 件 ／ 写真 ${nPhoto} 枚</div></div>

      <div class="sect">表計算・GIS用</div>
      <button class="btn" onclick="exportCSV(exportTargets(${arg}))">CSV（記録・区間・測点）</button>
      <div class="sp"></div>
      <button class="btn" onclick="exportGeoJSON(exportTargets(${arg}))">GeoJSON（点・線）</button>
      <div class="tiny muted" style="margin-top:8px">
        CSVはExcelでそのまま開けます（UTF-8 BOM）。GeoJSONは座標系 EPSG:4326 で、QGISにそのまま読み込めます。</div>

      <div class="sect">写真</div>
      <button class="btn" onclick="exportPhotoZip(exportTargets(${arg}))">写真をZIPでまとめる</button>
      <div class="tiny muted" style="margin-top:8px">どの産卵床の写真かが分かる対応表（index.csv）が一緒に入ります。</div>

      <div class="sect">まるごと保存（機種変更・PCへの受け渡し）</div>
      <button class="btn primary" onclick="exportFullBackup()">写真ごとバックアップ（ZIP）</button>
      <div class="tiny muted" style="margin-top:8px">
        機種変更のときはこれ1つで戻せます。記録と写真の実体が同じファイルに入ります。</div>
      <div class="sp"></div>
      <button class="btn" onclick="exportBackup()">記録だけバックアップ（JSON・軽い）</button>
      <div class="tiny muted" style="margin-top:8px">写真は含みません。日々の控えとして軽く残したいとき用。</div>
      <div class="sp"></div>
      <input type="file" id="fBackupIn" accept=".zip,.json,application/json,application/zip" style="display:none" onchange="importBackup(this)">
      <button class="btn" onclick="document.getElementById('fBackupIn').click()">バックアップを取り込む（ZIP・JSONどちらでも）</button>

      <div class="tiny muted" style="margin-top:16px">
        iPhoneでは書き出したファイルが共有シートに出るので「ファイルに保存」を選んでください。</div>`
  };
};
function exportTargets(svUuid){
  if(svUuid){ const s=DB.survey(svUuid); return s?[s]:[]; }
  return DB.surveys();
}

/* ============================================================
   ゴミ箱
   ============================================================ */
const TRASH_GROUPS = [
  { key:'sv', label:'調査',   name:x=>x.name||'(名称未設定)' },
  { key:'re', label:'区間',   name:x=>x.name||'(区間)' },
  { key:'rd', label:'産卵床', name:x=>`No.${x.redd_no||'—'} ${x.species||'種不明'}` },
  { key:'nt', label:'メモ',   name:x=>(x.content||'').slice(0,30)||'(メモ)' },
  { key:'un', label:'物理環境', name:x=>`${x.name||'(区間)'} ${x.river_form||''}` },
];
SCREENS.trash = ()=>{
  const blocks = TRASH_GROUPS.map(g=>{
    const list = DB.deleted(DB.key[g.key]);
    if(!list.length) return '';
    return `<div class="sect">${g.label}（${list.length}）</div>` + list.map(x=>`
      <div class="card"><div class="row">
        <div class="grow"><div>${esc(g.name(x))}</div>
          <div class="tiny muted">削除 ${fmtDate(x.deleted_at)} ${fmtTime(x.deleted_at)}</div></div>
        <button class="btn ghost small" style="width:auto" onclick="restoreItem('${g.key}','${x.uuid}')">戻す</button>
      </div></div>`).join('');
  }).join('');
  const total = TRASH_GROUPS.reduce((a,g)=>a+DB.deleted(DB.key[g.key]).length, 0);
  return {
    title:'ゴミ箱',
    sub:[{text:`${total} 件`}],
    html: total ? `${blocks}<div class="sp"></div>
        <button class="btn danger big" onclick="purgeAll()">ゴミ箱を空にする（完全に消す）</button>
        <div class="tiny muted" style="margin-top:8px">空にすると元に戻せません。写真も一緒に消えます。</div>`
      : `<div class="empty">ゴミ箱は空です。</div>`
  };
};
function restoreItem(k, u){
  if(!DB.restore(DB.key[k], u)){ alert('戻せませんでした。端末の空き容量を確認してください。'); return; }
  // 調査を戻すときは、一緒に消えた記録もまとめて戻す（空の調査が復活しないように）
  if(k==='sv'){
    let n=0;
    ['re','rd','nt','un'].forEach(ck=>{
      DB.deleted(DB.key[ck]).filter(x=>x.deleted_by===u).forEach(x=>{ if(DB.restore(DB.key[ck], x.uuid)) n++; });
    });
    toast(n ? `調査と記録 ${n} 件を戻しました` : '戻しました');
  }else toast('戻しました');
  render();
}
function purgeAll(){
  const total = TRASH_GROUPS.reduce((a,g)=>a+DB.deleted(DB.key[g.key]).length, 0);
  if(!confirm(`ゴミ箱の ${total} 件を完全に消します。元に戻せません。よろしいですか？`)) return;
  TRASH_GROUPS.forEach(g=>{
    DB.deleted(DB.key[g.key]).forEach(x=>DB.hardDelete(DB.key[g.key], x.uuid));
  });
  try{ PhotoDB.gc(); }catch(e){}   // 参照されなくなった写真も片付ける
  toast('ゴミ箱を空にしました');
  render();
}

/* ============================================================
   更新・起動
   ============================================================ */
// 「最新に更新」：このアプリのキャッシュだけ消して読み直す。他アプリのキャッシュは触らない
async function forceUpdate(){
  toast('最新版を確認しています…');
  try{
    if('serviceWorker' in navigator){
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
    if(window.caches){
      const keys = await caches.keys();
      await Promise.all(keys.filter(k=>k.startsWith('redd-survey-')||k.startsWith('redd-map-tiles-'))
        .map(k=>caches.delete(k)));
    }
  }catch(e){ console.error(e); }
  location.reload();
}

// アプリが裏に回る・閉じられるときにも、書きかけと軌跡を控えておく
window.addEventListener('pagehide', ()=>{ stashEditDraft(); trackSave(); });
document.addEventListener && document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='hidden'){ stashEditDraft(); trackSave(); }
});

(function boot(){
  resumeTracking();   // 記録中の区間があれば、開き直しても軌跡の記録を続ける
  render();   // 先に画面を出す。この後の準備を待つと起動時に一瞬何も映らないため
  try{ PhotoDB.gc(); }catch(e){}   // どこからも使われなくなった写真を片付ける
  // 保存領域を消されにくくする（写真やタイルを抱えるため）
  try{ if(navigator.storage && navigator.storage.persist) navigator.storage.persist().catch(()=>{}); }catch(e){}
  if('serviceWorker' in navigator && location.protocol!=='file:'){
    window.addEventListener('load', ()=>{ navigator.serviceWorker.register('./sw.js').catch(e=>console.error(e)); });
  }
})();
